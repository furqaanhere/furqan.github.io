<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<style>
body{
  font-family:Arial;
  background:#020617;
  color:white;
  margin:0;
}

/* LOGIN */
#loginPage{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.box{
  background:rgba(255,255,255,0.08);
  padding:25px;
  border-radius:12px;
  width:300px;
}

input,textarea{
  width:100%;
  padding:10px;
  margin:8px 0;
  border:none;
  border-radius:6px;
}

button{
  padding:10px;
  width:100%;
  background:#38bdf8;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

/* DASHBOARD */
#dashboard{
  display:none;
  padding:20px;
}

.card{
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:10px;
  margin-bottom:20px;
}

.tag{
  display:inline-block;
  background:#38bdf8;
  color:black;
  padding:5px 10px;
  margin:5px;
  border-radius:6px;
  cursor:pointer;
}

.project{
  background:rgba(255,255,255,0.05);
  padding:10px;
  margin:10px 0;
  border-radius:6px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
  <div class="box">
    <h2>Admin Login</h2>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

<h2>Dashboard</h2>
<button onclick="logout()">Logout</button>

<div class="card">
<h3>Profile</h3>
<input id="name" placeholder="Name">
<textarea id="bio" placeholder="Bio"></textarea>
</div>

<div class="card">
<h3>Skills</h3>
<div id="skills"></div>
<input id="skillInput">
<button onclick="addSkill()">Add</button>
</div>

<div class="card">
<h3>Projects</h3>
<div id="projects"></div>
<button onclick="addProject()">Add Project</button>
</div>

<button onclick="saveData()">💾 Save</button>

</div>

<script>

/* LOGIN (no auth issues now) */
function login(){
  document.getElementById("loginPage").style.display="none";
  document.getElementById("dashboard").style.display="block";
  loadData();
}

/* LOGOUT */
function logout(){
  location.reload();
}

/* ADD SKILL */
function addSkill(){
  let val=document.getElementById("skillInput").value;
  if(!val) return;

  let el=document.createElement("span");
  el.className="tag";
  el.innerText=val;
  el.onclick=()=>el.remove();

  document.getElementById("skills").appendChild(el);
  document.getElementById("skillInput").value="";
}

/* ADD PROJECT */
function addProject(){
  let div=document.createElement("div");
  div.className="project";

  div.innerHTML=`
    <input placeholder="Title">
    <textarea placeholder="Description"></textarea>
    <button onclick="this.parentElement.remove()">Remove</button>
  `;

  document.getElementById("projects").appendChild(div);
}

/* SAVE */
function saveData(){

let data={
  name:document.getElementById("name").value,
  bio:document.getElementById("bio").value,
  skills:[...document.querySelectorAll("#skills .tag")].map(e=>e.innerText),
  projects:[...document.querySelectorAll("#projects .project")].map(p=>{
    let i=p.querySelectorAll("input,textarea");
    return {title:i[0].value,desc:i[1].value};
  })
};

localStorage.setItem("portfolio", JSON.stringify(data));

alert("Saved successfully ✅");
}

/* LOAD */
function loadData(){

let data=JSON.parse(localStorage.getItem("portfolio")||"{}");

document.getElementById("name").value=data.name||"";
document.getElementById("bio").value=data.bio||"";

/* SKILLS */
let skillsDiv=document.getElementById("skills");
skillsDiv.innerHTML="";
(data.skills||[]).forEach(s=>{
  let el=document.createElement("span");
  el.className="tag";
  el.innerText=s;
  el.onclick=()=>el.remove();
  skillsDiv.appendChild(el);
});

/* PROJECTS */
let projDiv=document.getElementById("projects");
projDiv.innerHTML="";
(data.projects||[]).forEach(p=>{
  addProject();
  let last=projDiv.lastChild.querySelectorAll("input,textarea");
  last[0].value=p.title;
  last[1].value=p.desc;
});

}

</script>

</body>
</html>
