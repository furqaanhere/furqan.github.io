<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#020617;
  color:white;
}
.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}
.card{
  background:rgba(15,23,42,0.6);
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
}
input,textarea{
  width:100%;
  padding:10px;
  margin:8px 0;
  border:none;
  border-radius:6px;
}
button{
  padding:10px;
  border:none;
  border-radius:6px;
  background:#38bdf8;
  cursor:pointer;
}
.tag{
  display:inline-block;
  background:#38bdf8;
  color:black;
  padding:5px 10px;
  margin:5px;
  border-radius:6px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h1>🚀 Admin Panel</h1>

<div class="card" id="loginBox">
<h3>Login</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<div id="dashboard" style="display:none;">

<div class="card">
<h3>Profile</h3>
<input id="name" placeholder="Full Name">
<input id="tagline" placeholder="Title">
<textarea id="about" placeholder="Bio"></textarea>
</div>

<div class="card">
<h3>Skills</h3>
<div id="skills"></div>
<input id="newSkill" placeholder="Add skill">
<button onclick="addTag('skills','newSkill')">+ Add</button>
</div>

<div class="card">
<h3>Tools</h3>
<div id="tools"></div>
<input id="newTool" placeholder="Add tool">
<button onclick="addTag('tools','newTool')">+ Add</button>
</div>

<div class="card">
<h3>Strengths</h3>
<div id="strengths"></div>
<input id="newStrength" placeholder="Add strength">
<button onclick="addTag('strengths','newStrength')">+ Add</button>
</div>

<div class="card">
<h3>Resume</h3>
<input id="resume" placeholder="Resume link">
</div>

<div class="card">
<h3>Projects</h3>
<div id="projects"></div>
<button onclick="addProject()">+ Add Project</button>
</div>

<button onclick="saveData()">💾 Save</button>
<button onclick="logout()">Logout</button>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc } 
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC_i8vOeQZMdhaKLd32IbwKjUsTlm56Zpc",
  authDomain: "furqaan-portfolio.firebaseapp.com",
  projectId: "furqaan-portfolio"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const loginBox = document.getElementById("loginBox");
const dashboard = document.getElementById("dashboard");

/* 🔥 AUTO LOGIN + LOAD FIX */
onAuthStateChanged(auth, (user) => {
  if (user) {
    loginBox.style.display = "none";
    dashboard.style.display = "block";

    setTimeout(() => {
      loadData();
    }, 300);
  }
});

/* LOGIN */
window.login = async function(){
  try{
    await signInWithEmailAndPassword(auth,email.value.trim(),password.value.trim());
  }catch(e){
    alert(e.message);
  }
}

/* LOGOUT */
window.logout = async ()=>{
  await signOut(auth);
  location.reload();
}

/* TAG */
window.addTag = function(section,inputId){
  let val = document.getElementById(inputId).value;
  if(!val) return;

  let el = document.createElement("span");
  el.className="tag";
  el.innerText=val;
  el.onclick=()=>el.remove();

  document.getElementById(section).appendChild(el);
  document.getElementById(inputId).value="";
}

/* ADD PROJECT */
window.addProject = function(){
let div=document.createElement("div");
div.className="card";

div.innerHTML=`
<input placeholder="Title">
<input placeholder="Short">
<input placeholder="Image">
<textarea placeholder="Description"></textarea>
<button onclick="this.parentElement.remove()">❌</button>
`;

projects.appendChild(div);
}

/* SAVE */
window.saveData = async function(){

let getTags = (id)=>[...document.querySelectorAll(`#${id} .tag`)].map(t=>t.innerText);

let data={
name:name.value,
tagline:tagline.value,
about:{intro:about.value},
skills:getTags("skills"),
tools:getTags("tools"),
strengths:getTags("strengths"),
resume:resume.value,
projects:[...document.querySelectorAll("#projects .card")].map(c=>{
let i=c.querySelectorAll("input,textarea");
return {
title:i[0].value,
short:i[1].value,
image:i[2].value,
description:i[3].value
};
})
};

await setDoc(doc(db,"portfolio","data"),data);
alert("Saved 🚀");
}

/* 🔥 FINAL FIXED LOAD */
async function loadData(){

const snap = await getDoc(doc(db,"portfolio","data"));

if(!snap.exists()) return;

const d = snap.data();

/* PROFILE */
name.value = d.name || "";
tagline.value = d.tagline || "";
about.value = d.about?.intro || "";
resume.value = d.resume || "";

/* CLEAR */
skills.innerHTML="";
tools.innerHTML="";
strengths.innerHTML="";
projects.innerHTML="";

/* TAGS */
(d.skills||[]).forEach(v=>{
let el=document.createElement("span");
el.className="tag";
el.innerText=v;
el.onclick=()=>el.remove();
skills.appendChild(el);
});

(d.tools||[]).forEach(v=>{
let el=document.createElement("span");
el.className="tag";
el.innerText=v;
el.onclick=()=>el.remove();
tools.appendChild(el);
});

(d.strengths||[]).forEach(v=>{
let el=document.createElement("span");
el.className="tag";
el.innerText=v;
el.onclick=()=>el.remove();
strengths.appendChild(el);
});

/* PROJECTS */
(d.projects||[]).forEach(p=>{
addProject();
let last=projects.lastChild.querySelectorAll("input,textarea");

last[0].value=p.title || "";
last[1].value=p.short || "";
last[2].value=p.image || "";
last[3].value=p.description || "";
});

}

</script>

</body>
</html>
