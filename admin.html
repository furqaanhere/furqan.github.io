<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #020617;
      color: white;
      text-align: center;
    }

    .container {
      padding: 80px 20px;
    }

    h1 {
      margin-bottom: 30px;
    }

    .card {
      background: #0f172a;
      padding: 25px;
      border-radius: 12px;
      display: inline-block;
      width: 300px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 6px;
      border: none;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      background: linear-gradient(45deg, #00f5ff, #7b2ff7);
      border: none;
      border-radius: 8px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
    }

    .danger {
      background: #ef4444;
    }

    .status {
      margin-top: 15px;
      font-size: 14px;
      color: #94a3b8;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Admin Panel</h1>

    <div class="card">
      <h3>Manage Resume</h3>

      <input type="file" id="resumeInput" accept=".pdf,.doc,.docx">

      <button onclick="uploadResume()">Upload / Replace Resume</button>
      <button class="danger" onclick="deleteResume()">Delete Resume</button>

      <div id="status" class="status"></div>
    </div>
  </div>

  <script>
    const status = document.getElementById("status");

    function uploadResume() {
      const fileInput = document.getElementById("resumeInput");
      const file = fileInput.files[0];

      if (!file) {
        alert("Select a file first");
        return;
      }

      const reader = new FileReader();

      reader.onload = function (e) {
        localStorage.setItem("resume", e.target.result);
        status.innerText = "✅ Resume uploaded successfully";
      };

      reader.readAsDataURL(file);
    }

    function deleteResume() {
      localStorage.removeItem("resume");
      status.innerText = "❌ Resume deleted";
    }

    // Show current status
    if (localStorage.getItem("resume")) {
      status.innerText = "📄 Resume already uploaded";
    } else {
      status.innerText = "No resume uploaded";
    }
  </script>

</body>
</html>
