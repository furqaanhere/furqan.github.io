<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<style>
body{
  font-family:Arial;
  background:#020617;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* BOX */
.box{
  background:rgba(15,23,42,0.6);
  padding:20px;
  border-radius:10px;
  width:300px;
}

/* INPUT */
input,textarea,button{
  width:100%;
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:6px;
}

button{
  background:#38bdf8;
  color:black;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox" class="box">
<h2>Admin Login</h2>
<input type="password" id="pass" placeholder="Enter password">
<button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="box" style="display:none;">
<h2>Dashboard</h2>

<textarea id="jsonData" rows="10"></textarea>

<button onclick="save()">Save</button>
<button onclick="logout()">Logout</button>
</div>

<script>

const PASSWORD = "1234"; // change if needed

function login(){
  let input = document.getElementById("pass").value;

  if(input === PASSWORD){

    // hide login
    document.getElementById("loginBox").style.display = "none";

    // show dashboard
    document.getElementById("dashboard").style.display = "block";

    // load saved data
    let data = localStorage.getItem("data");

    if(data){
      document.getElementById("jsonData").value = data;
    }else{
      document.getElementById("jsonData").value = "Paste JSON here...";
    }

  }else{
    alert("Wrong password ❌");
  }
}

function save(){
  let data = document.getElementById("jsonData").value;
  localStorage.setItem("data", data);
  alert("Saved ✅ Refresh main site");
}

function logout(){
  location.reload();
}

</script>

</body>
</html>
