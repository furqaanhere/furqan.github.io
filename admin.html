<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>

<style>
body{
  font-family:Arial;
  background:#020617;
  color:white;
  padding:20px;
}

/* CARD */
.box{
  background:rgba(15,23,42,0.6);
  padding:20px;
  border-radius:10px;
  margin-bottom:20px;
}

input,textarea{
  width:100%;
  margin:8px 0;
  padding:10px;
  border-radius:6px;
  border:none;
}

button{
  padding:10px;
  background:#38bdf8;
  border:none;
  margin-top:10px;
  cursor:pointer;
  border-radius:6px;
}

/* PROJECT */
.project{
  border:1px solid rgba(255,255,255,0.2);
  padding:10px;
  margin-top:10px;
  border-radius:6px;
}
</style>
</head>

<body>

<h1>🚀 Admin Dashboard</h1>

<!-- BASIC INFO -->
<div class="box">
<h2>Profile</h2>
<input id="name" placeholder="Name">
<input id="tagline" placeholder="Tagline">
<textarea id="about" placeholder="About"></textarea>
</div>

<!-- PROJECTS -->
<div class="box">
<h2>Projects</h2>
<div id="projects"></div>

<button onclick="addProject()">➕ Add Project</button>
</div>

<!-- SAVE -->
<button onclick="save()">💾 Save All</button>

<script>

let data={};

// LOAD DATA
fetch("content.json")
.then(r=>r.json())
.then(d=>{
  data=d;

  document.getElementById("name").value=d.name;
  document.getElementById("tagline").value=d.tagline;
  document.getElementById("about").value=d.about.intro;

  renderProjects();
});

// RENDER PROJECTS
function renderProjects(){
  let html="";
  data.projects.forEach((p,i)=>{
    html+=`
    <div class="project">
      <input value="${p.title}" onchange="update(${i},'title',this.value)">
      <input value="${p.short}" onchange="update(${i},'short',this.value)">
      <input value="${p.image}" onchange="update(${i},'image',this.value)">
      <textarea onchange="update(${i},'description',this.value)">${p.description}</textarea>

      <button onclick="removeProject(${i})">❌ Remove</button>
    </div>
    `;
  });

  document.getElementById("projects").innerHTML=html;
}

// UPDATE
function update(i,key,val){
  data.projects[i][key]=val;
}

// ADD PROJECT
function addProject(){
  data.projects.push({
    title:"New Project",
    short:"Short desc",
    description:"Details",
    image:"photo.jpg",
    tech:[]
  });
  renderProjects();
}

// REMOVE
function removeProject(i){
  data.projects.splice(i,1);
  renderProjects();
}

// SAVE
function save(){

  data.name=document.getElementById("name").value;
  data.tagline=document.getElementById("tagline").value;
  data.about.intro=document.getElementById("about").value;

  localStorage.setItem("data", JSON.stringify(data));

  alert("✅ Saved! Refresh website");
}

</script>

</body>
</html>
