<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#020617;
  color:white;
}

/* LOGIN */
.loginPage{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.loginBox{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(15px);
  padding:30px;
  border-radius:15px;
  width:300px;
}

input{
  width:100%;
  padding:10px;
  margin:10px 0;
  border:none;
  border-radius:6px;
}

button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:6px;
  background:#38bdf8;
  cursor:pointer;
}

/* DASHBOARD */
.dashboard{
  display:none;
}

/* SIDEBAR */
.sidebar{
  width:220px;
  height:100vh;
  position:fixed;
  background:#020617;
  padding:20px;
}

.sidebar button{
  width:100%;
  margin:10px 0;
  padding:10px;
  background:rgba(255,255,255,0.05);
  border:none;
  color:white;
  border-radius:6px;
}

/* MAIN */
.main{
  margin-left:240px;
  padding:20px;
}

.card{
  background:rgba(15,23,42,0.6);
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
}

.tag{
  display:inline-block;
  background:#38bdf8;
  color:black;
  padding:5px 10px;
  margin:5px;
  border-radius:6px;
}

.section{display:none;}
.section.active{display:block;}

</style>
</head>

<body>

<!-- LOGIN -->
<div class="loginPage" id="loginPage">
  <div class="loginBox">
    <h2>Admin Login</h2>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">

<div class="sidebar">
<button onclick="show('profile',this)">Profile</button>
<button onclick="show('skills',this)">Skills</button>
<button onclick="show('projects',this)">Projects</button>
<button onclick="logout()">Logout</button>
</div>

<div class="main">

<div id="profile" class="section active card">
<input id="name">
<input id="tagline">
<textarea id="about"></textarea>
<input id="resume">
</div>

<div id="skills" class="section card">
<div id="skillsList"></div>
<input id="newSkill">
<button onclick="addTag('skillsList','newSkill')">Add</button>
</div>

<div id="projects" class="section card">
<div id="projectsList"></div>
<button onclick="addProject()">Add Project</button>
</div>

<button onclick="saveData()">💾 Save</button>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc } 
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC_i8vOeQZMdhaKLd32IbwKjUsTlm56Zpc",
  authDomain: "furqaan-portfolio.firebaseapp.com",
  projectId: "furqaan-portfolio"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* 🔥 LOGIN STATE */
onAuthStateChanged(auth, user=>{
  if(user){
    loginPage.style.display="none";
    dashboard.style.display="block";
    setTimeout(loadData,300);
  }
});

/* 🔥 LOGIN FIXED */
window.login = async ()=>{
  try{
    await signInWithEmailAndPassword(
      auth,
      email.value.trim(),
      password.value.trim()
    );
  }catch(e){
    console.error(e);
    alert(e.message); // 🔥 shows real error
  }
};

/* LOGOUT */
window.logout = async ()=>{
  await signOut(auth);
  location.reload();
};

/* NAV */
window.show = function(sec,btn){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(sec).classList.add("active");

  document.querySelectorAll(".sidebar button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
};

/* TAG */
window.addTag = function(id,input){
  let v=document.getElementById(input).value;
  if(!v) return;
  let el=document.createElement("span");
  el.className="tag";
  el.innerText=v;
  el.onclick=()=>el.remove();
  document.getElementById(id).appendChild(el);
  document.getElementById(input).value="";
};

/* PROJECT */
window.addProject = function(){
let div=document.createElement("div");
div.className="card";

div.innerHTML=`
<input placeholder="Title">
<input placeholder="Short">
<input placeholder="Image">
<textarea placeholder="Description"></textarea>
`;

projectsList.appendChild(div);
};

/* SAVE */
window.saveData = async function(){

let getTags=id=>[...document.querySelectorAll(`#${id} .tag`)].map(t=>t.innerText);

let data={
name:name.value,
tagline:tagline.value,
about:{intro:about.value},
skills:getTags("skillsList"),
resume:resume.value,
projects:[...document.querySelectorAll("#projectsList .card")].map(c=>{
let i=c.querySelectorAll("input,textarea");
return{
title:i[0].value,
short:i[1].value,
image:i[2].value,
description:i[3].value
};
})
};

await setDoc(doc(db,"portfolio","data"),data);
alert("Saved 🚀");
};

/* LOAD */
async function loadData(){
let snap=await getDoc(doc(db,"portfolio","data"));
if(!snap.exists()) return;

let d=snap.data();

name.value=d.name||"";
tagline.value=d.tagline||"";
about.value=d.about?.intro||"";
resume.value=d.resume||"";

skillsList.innerHTML="";
(d.skills||[]).forEach(v=>{
let el=document.createElement("span");
el.className="tag";
el.innerText=v;
skillsList.appendChild(el);
});

projectsList.innerHTML="";
(d.projects||[]).forEach(p=>{
addProject();
let i=projectsList.lastChild.querySelectorAll("input,textarea");
i[0].value=p.title;
i[1].value=p.short;
i[2].value=p.image;
i[3].value=p.description;
});
}

</script>

</body>
</html>
