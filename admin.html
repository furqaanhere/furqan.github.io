<!DOCTYPE html>
<html>
<head>
<title>Pro Admin Dashboard</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#020617;
  color:white;
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:240px;
  height:100vh;
  background:rgba(15,23,42,0.9);
  padding:20px;
  border-right:1px solid rgba(255,255,255,0.1);
}

.sidebar h2{
  color:#38bdf8;
}

.sidebar button{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:8px;
  background:rgba(255,255,255,0.05);
  color:white;
  cursor:pointer;
}

.sidebar button:hover{
  background:#38bdf8;
  color:black;
}

/* MAIN */
.main{
  flex:1;
  padding:20px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(12px);
  border-radius:12px;
  padding:20px;
  margin-bottom:20px;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
}

input,textarea{
  width:100%;
  padding:10px;
  margin:8px 0;
  border:none;
  border-radius:6px;
}

button{
  padding:10px 15px;
  border:none;
  border-radius:6px;
  background:#38bdf8;
  cursor:pointer;
}

/* TAG */
.tag{
  display:inline-block;
  background:#38bdf8;
  color:black;
  padding:6px 10px;
  margin:5px;
  border-radius:6px;
  cursor:pointer;
}

/* SECTIONS */
.section{display:none;}
.active{display:block;}

img.preview{
  width:100%;
  border-radius:10px;
  margin-top:10px;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<h2>⚡ Admin</h2>
<button onclick="show('profile')">Profile</button>
<button onclick="show('skills')">Skills</button>
<button onclick="show('projects')">Projects</button>
<button onclick="logout()">Logout</button>
</div>

<!-- MAIN -->
<div class="main">

<!-- LOGIN -->
<div id="loginBox" class="card">
<h3>Login</h3>
<input id="email" placeholder="Email">
<input id="password" type="password">
<button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none;">

<!-- PROFILE -->
<div id="profile" class="section active card">
<h3>Profile</h3>

<input id="name" placeholder="Name">
<input id="tagline" placeholder="Title">
<textarea id="about"></textarea>

<label>Profile Image</label>
<input type="file" onchange="uploadImage(event,'profileImg')">
<img id="profileImg" class="preview">

<label>Resume</label>
<input id="resume">

</div>

<!-- SKILLS -->
<div id="skillsSec" class="section card">
<h3>Skills</h3>
<div id="skills"></div>
<input id="newSkill">
<button onclick="addTag('skills','newSkill')">Add</button>
</div>

<!-- PROJECTS -->
<div id="projectsSec" class="section card">
<h3>Projects</h3>
<div id="projects"></div>
<button onclick="addProject()">Add Project</button>
</div>

<button onclick="saveData()">💾 Save</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc } 
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC_i8vOeQZMdhaKLd32IbwKjUsTlm56Zpc",
  authDomain: "furqaan-portfolio.firebaseapp.com",
  projectId: "furqaan-portfolio"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const loginBox = document.getElementById("loginBox");
const dashboard = document.getElementById("dashboard");

/* NAV */
window.show = function(sec){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(sec==="skills"?"skillsSec":sec==="projects"?"projectsSec":sec).classList.add("active");
}

/* AUTH */
onAuthStateChanged(auth,user=>{
  if(user){
    loginBox.style.display="none";
    dashboard.style.display="block";
    setTimeout(loadData,300);
  }
});

window.login = async ()=>{
  await signInWithEmailAndPassword(auth,email.value,password.value);
};

window.logout = async ()=>{
  await signOut(auth);
  location.reload();
};

/* IMAGE PREVIEW */
window.uploadImage = function(e,id){
  let file=e.target.files[0];
  let reader=new FileReader();
  reader.onload=()=>{
    document.getElementById(id).src=reader.result;
  };
  reader.readAsDataURL(file);
};

/* TAG */
window.addTag = function(id,input){
  let v=document.getElementById(input).value;
  let el=document.createElement("span");
  el.className="tag";
  el.innerText=v;
  el.onclick=()=>el.remove();
  document.getElementById(id).appendChild(el);
};

/* PROJECT */
window.addProject = function(){
let div=document.createElement("div");
div.className="card";

div.innerHTML=`
<input placeholder="Title">
<input placeholder="Short">
<input placeholder="Image URL">
<textarea placeholder="Description"></textarea>
<button onclick="this.parentElement.remove()">❌</button>
`;

projects.appendChild(div);
};

/* SAVE */
window.saveData = async function(){

let getTags=id=>[...document.querySelectorAll(`#${id} .tag`)].map(t=>t.innerText);

let data={
name:name.value,
tagline:tagline.value,
about:{intro:about.value},
skills:getTags("skills"),
resume:resume.value,
projects:[...document.querySelectorAll("#projects .card")].map(c=>{
let i=c.querySelectorAll("input,textarea");
return{
title:i[0].value,
short:i[1].value,
image:i[2].value,
description:i[3].value
};
})
};

await setDoc(doc(db,"portfolio","data"),data);
alert("Saved 🚀");
};

/* LOAD */
async function loadData(){
let snap=await getDoc(doc(db,"portfolio","data"));
if(!snap.exists()) return;
let d=snap.data();

name.value=d.name||"";
tagline.value=d.tagline||"";
about.value=d.about?.intro||"";
resume.value=d.resume||"";

skills.innerHTML="";
(d.skills||[]).forEach(v=>{
let el=document.createElement("span");
el.className="tag";
el.innerText=v;
skills.appendChild(el);
});

projects.innerHTML="";
(d.projects||[]).forEach(p=>{
addProject();
let i=projects.lastChild.querySelectorAll("input,textarea");
i[0].value=p.title;
i[1].value=p.short;
i[2].value=p.image;
i[3].value=p.description;
});
}

</script>

</body>
</html>
