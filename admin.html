<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#020617;
  color:white;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.card{
  background:rgba(15,23,42,0.6);
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
}

input, textarea{
  width:100%;
  margin:8px 0;
  padding:10px;
  border-radius:6px;
  border:none;
}

button{
  padding:10px;
  border:none;
  border-radius:6px;
  background:#38bdf8;
  cursor:pointer;
}

.skill{
  display:inline-block;
  background:#38bdf8;
  color:black;
  padding:5px 10px;
  margin:5px;
  border-radius:6px;
  cursor:pointer;
}

.ach{
  background:rgba(56,189,248,0.2);
  padding:6px;
  margin:5px 0;
  border-radius:6px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h1>🚀 Admin Panel</h1>

<!-- LOGIN -->
<div class="card" id="loginBox">
<h2>Login</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none;">

<!-- PROFILE -->
<div class="card">
<h3>Profile</h3>
<input id="tagline" placeholder="Title">
<textarea id="about" placeholder="Bio"></textarea>
</div>

<!-- SKILLS -->
<div class="card">
<h3>Skills (click to remove)</h3>
<div id="skills"></div>
<input id="newSkill" placeholder="Add skill">
<button onclick="addSkill()">+ Add Skill</button>
</div>

<!-- ACHIEVEMENTS -->
<div class="card">
<h3>Achievements (click to remove)</h3>
<div id="achievements"></div>
<input id="newAch" placeholder="Add achievement">
<button onclick="addAch()">+ Add</button>
</div>

<!-- PROJECTS -->
<div class="card">
<h3>Projects</h3>
<div id="projects"></div>
<button onclick="addProject()">+ Add Project</button>
</div>

<button onclick="saveData()">💾 Save All</button>
<button onclick="logout()">Logout</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc } 
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC_i8vOeQZMdhaKLd32IbwKjUsTlm56Zpc",
  authDomain: "furqaan-portfolio.firebaseapp.com",
  projectId: "furqaan-portfolio"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* LOGIN */
window.login = async function(){
  try{
    await signInWithEmailAndPassword(auth,email.value.trim(),password.value.trim());
    loginBox.style.display="none";
    dashboard.style.display="block";
    loadData();
  }catch(e){
    alert(e.message);
  }
}

/* LOGOUT */
window.logout = ()=>location.reload();

/* ADD SKILL */
window.addSkill = function(v){
let val=v||newSkill.value;
if(!val)return;

let s=document.createElement("span");
s.className="skill";
s.innerText=val;
s.onclick=()=>s.remove();

skills.appendChild(s);
newSkill.value="";
}

/* ADD ACH */
window.addAch = function(v){
let val=v||newAch.value;
if(!val)return;

let d=document.createElement("div");
d.className="ach";
d.innerText=val;
d.onclick=()=>d.remove();

achievements.appendChild(d);
newAch.value="";
}

/* ADD PROJECT */
window.addProject = function(){
let div=document.createElement("div");
div.className="card";

div.innerHTML=`
<input placeholder="Title">
<input placeholder="Short">
<input placeholder="Image (apple.jpg)">
<textarea placeholder="Description"></textarea>
<button onclick="this.parentElement.remove()">❌ Remove</button>
`;

projects.appendChild(div);
}

/* SAVE */
window.saveData = async function(){

let skillsArr=[...document.querySelectorAll(".skill")].map(s=>s.innerText);
let achArr=[...document.querySelectorAll(".ach")].map(a=>a.innerText);

let projArr=[];
document.querySelectorAll("#projects .card").forEach(c=>{
let i=c.querySelectorAll("input,textarea");

projArr.push({
title:i[0].value,
short:i[1].value,
image:i[2].value,
description:i[3].value
});
});

await setDoc(doc(db,"portfolio","data"),{
tagline:tagline.value,
about:{intro:about.value},
skills:skillsArr,
achievements:achArr,
projects:projArr
});

alert("Saved 🚀");
}

/* LOAD */
async function loadData(){

let snap=await getDoc(doc(db,"portfolio","data"));

if(snap.exists()){
let d=snap.data();

tagline.value=d.tagline||"";
about.value=d.about?.intro||"";

skills.innerHTML="";
(d.skills||[]).forEach(s=>addSkill(s));

achievements.innerHTML="";
(d.achievements||[]).forEach(a=>addAch(a));

projects.innerHTML="";
(d.projects||[]).forEach(p=>{
addProject();
let last=projects.lastChild.querySelectorAll("input,textarea");

last[0].value=p.title;
last[1].value=p.short;
last[2].value=p.image;
last[3].value=p.description;
});
}
}

</script>

</body>
</html>
