<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#020617;
  color:white;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.card{
  background:rgba(15,23,42,0.6);
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
}

input,textarea{
  width:100%;
  padding:10px;
  margin:8px 0;
  border:none;
  border-radius:6px;
}

button{
  padding:10px;
  border:none;
  border-radius:6px;
  background:#38bdf8;
  cursor:pointer;
}

.tag{
  display:inline-block;
  background:#38bdf8;
  color:black;
  padding:5px 10px;
  margin:5px;
  border-radius:6px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h1>🚀 Admin Panel</h1>

<!-- LOGIN -->
<div class="card" id="loginBox">
<h3>Login</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none;">

<!-- PROFILE -->
<div class="card">
<h3>Profile</h3>
<input id="tagline" placeholder="Title">
<textarea id="about" placeholder="Bio"></textarea>
</div>

<!-- SKILLS -->
<div class="card">
<h3>Skills</h3>
<div id="skills"></div>
<input id="newSkill" placeholder="Add skill">
<button onclick="addTag('skills','newSkill')">+ Add</button>
</div>

<!-- TOOLS -->
<div class="card">
<h3>Tools & Technologies</h3>
<div id="tools"></div>
<input id="newTool" placeholder="Add tool">
<button onclick="addTag('tools','newTool')">+ Add</button>
</div>

<!-- STRENGTHS -->
<div class="card">
<h3>Strengths</h3>
<div id="strengths"></div>
<input id="newStrength" placeholder="Add strength">
<button onclick="addTag('strengths','newStrength')">+ Add</button>
</div>

<!-- RESUME -->
<div class="card">
<h3>Resume</h3>
<input id="resume" placeholder="Resume link (Google Drive)">
</div>

<!-- PROJECTS -->
<div class="card">
<h3>Projects</h3>
<div id="projects"></div>
<button onclick="addProject()">+ Add Project</button>
</div>

<button onclick="saveData()">💾 Save All</button>
<button onclick="logout()">Logout</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc } 
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC_i8vOeQZMdhaKLd32IbwKjUsTlm56Zpc",
  authDomain: "furqaan-portfolio.firebaseapp.com",
  projectId: "furqaan-portfolio"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* LOGIN */
window.login = async function(){
  try{
    await signInWithEmailAndPassword(auth,email.value.trim(),password.value.trim());
    loginBox.style.display="none";
    dashboard.style.display="block";
    loadData();
  }catch(e){
    alert(e.message);
  }
}

/* LOGOUT */
window.logout = ()=>location.reload();

/* ADD TAG (skills/tools/strengths) */
window.addTag = function(section,inputId){
  let val = document.getElementById(inputId).value;
  if(!val) return;

  let el = document.createElement("span");
  el.className="tag";
  el.innerText=val;
  el.onclick=()=>el.remove();

  document.getElementById(section).appendChild(el);
  document.getElementById(inputId).value="";
}

/* ADD PROJECT */
window.addProject = function(){
let div=document.createElement("div");
div.className="card";

div.innerHTML=`
<input placeholder="Title">
<input placeholder="Short">
<input placeholder="Image">
<textarea placeholder="Description"></textarea>
<button onclick="this.parentElement.remove()">❌ Remove</button>
`;

projects.appendChild(div);
}

/* SAVE */
window.saveData = async function(){

let getTags = (id)=>[...document.querySelectorAll(`#${id} .tag`)].map(t=>t.innerText);

let data={
tagline:tagline.value,
about:{intro:about.value},
skills:getTags("skills"),
tools:getTags("tools"),
strengths:getTags("strengths"),
resume:resume.value,
projects:[...document.querySelectorAll("#projects .card")].map(c=>{
let i=c.querySelectorAll("input,textarea");
return {
title:i[0].value,
short:i[1].value,
image:i[2].value,
description:i[3].value
};
})
};

await setDoc(doc(db,"portfolio","data"),data);
alert("Saved 🚀");
}

/* LOAD */
async function loadData(){
let snap=await getDoc(doc(db,"portfolio","data"));

if(snap.exists()){
let d=snap.data();

tagline.value=d.tagline||"";
about.value=d.about?.intro||"";
resume.value=d.resume||"";

(d.skills||[]).forEach(v=>{newSkill.value=v; addTag("skills","newSkill");});
(d.tools||[]).forEach(v=>{newTool.value=v; addTag("tools","newTool");});
(d.strengths||[]).forEach(v=>{newStrength.value=v; addTag("strengths","newStrength");});

(d.projects||[]).forEach(p=>{
addProject();
let last=projects.lastChild.querySelectorAll("input,textarea");

last[0].value=p.title;
last[1].value=p.short;
last[2].value=p.image;
last[3].value=p.description;
});
}
}

</script>

</body>
</html>
