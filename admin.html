<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>

<style>
body{
  font-family:Arial;
  background:#020617;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* BOX */
.box{
  background:rgba(15,23,42,0.7);
  padding:25px;
  border-radius:12px;
  width:300px;
  text-align:center;
}

/* INPUT */
input{
  width:100%;
  padding:10px;
  margin:10px 0;
  border:none;
  border-radius:6px;
}

/* BUTTON */
button{
  width:100%;
  padding:10px;
  background:#38bdf8;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

/* DASHBOARD */
#dashboard{
  display:none;
  width:90%;
  height:100vh;
  overflow:auto;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox" class="box">
<h2>Admin Login</h2>

<input id="email" placeholder="Enter email">
<input id="password" type="password" placeholder="Enter password">

<button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

<h1>🚀 Admin Dashboard</h1>

<textarea id="jsonData" style="width:100%;height:200px;"></textarea>

<button onclick="save()">Save</button>
<button onclick="logout()">Logout</button>

</div>

<script>

// 🔐 DEFAULT LOGIN
const ADMIN_EMAIL = "admin@furqan.com";
const ADMIN_PASS = "1234";

// LOGIN
function login(){

let email = document.getElementById("email").value;
let pass = document.getElementById("password").value;

if(email === ADMIN_EMAIL && pass === ADMIN_PASS){

  // hide login
  document.getElementById("loginBox").style.display="none";

  // show dashboard
  document.getElementById("dashboard").style.display="block";

  // load data
  let data = localStorage.getItem("data");
  if(data){
    document.getElementById("jsonData").value = data;
  }

}else{
  alert("Invalid email or password ❌");
}

}

// SAVE
function save(){
  let data = document.getElementById("jsonData").value;
  localStorage.setItem("data", data);
  alert("Saved ✅ Refresh site");
}

// LOGOUT
function logout(){
  location.reload();
}

</script>

</body>
</html>
