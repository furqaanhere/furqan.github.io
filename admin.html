<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>

<style>
body{margin:0;font-family:Arial;background:#020617;color:white;}
.login{height:100vh;display:flex;justify-content:center;align-items:center;}
.box{background:rgba(255,255,255,0.06);backdrop-filter:blur(12px);padding:25px;border-radius:12px;width:300px;}
input,textarea{width:100%;padding:10px;margin:8px 0;border:none;border-radius:6px;}
.dashboard{display:none;padding:20px;}
.topbar{display:flex;justify-content:space-between;margin-bottom:20px;}
.card{background:rgba(255,255,255,0.05);backdrop-filter:blur(12px);padding:20px;border-radius:10px;margin-bottom:20px;}
.tag{display:inline-block;background:#38bdf8;color:black;padding:5px 10px;margin:5px;border-radius:6px;cursor:pointer;}
.project{background:rgba(255,255,255,0.05);padding:10px;margin:10px 0;border-radius:6px;}
</style>
</head>

<body>

<div class="login" id="login">
  <div class="box">
    <h2>Login</h2>
    <input id="email" placeholder="Email">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<div class="dashboard" id="dashboard">

<div class="topbar">
<h2>Dashboard</h2>
<button onclick="logout()">Logout</button>
</div>

<div class="card">
<h3>Profile</h3>
<input id="name" placeholder="Name">
<textarea id="bio" placeholder="Bio"></textarea>
</div>

<div class="card">
<h3>Skills</h3>
<div id="skills"></div>
<input id="skillInput">
<button onclick="addSkill()">Add</button>
</div>

<div class="card">
<h3>Achievements</h3>
<div id="achievements"></div>
<input id="achInput">
<button onclick="addAchievement()">Add</button>
</div>

<div class="card">
<h3>Projects</h3>
<div id="projects"></div>
<button onclick="addProject()">Add Project</button>
</div>

<button onclick="save()">💾 Save</button>

</div>

<script>

function login(){
  if(email.value && pass.value){
    login.style.display="none";
    dashboard.style.display="block";
    load();
  }
}

function logout(){ location.reload(); }

function addSkill(){
  let val=skillInput.value;
  if(!val) return;
  let el=document.createElement("span");
  el.className="tag";
  el.innerText=val;
  el.onclick=()=>el.remove();
  skills.appendChild(el);
  skillInput.value="";
}

function addAchievement(){
  let val=achInput.value;
  if(!val) return;
  let el=document.createElement("span");
  el.className="tag";
  el.innerText=val;
  el.onclick=()=>el.remove();
  achievements.appendChild(el);
  achInput.value="";
}

function addProject(){
let div=document.createElement("div");
div.className="project";
div.innerHTML=`
<input placeholder="Title">
<textarea placeholder="Description"></textarea>
<button onclick="this.parentElement.remove()">Remove</button>
`;
projects.appendChild(div);
}

function save(){
let data={
name:name.value,
bio:bio.value,
skills:[...skills.children].map(e=>e.innerText),
achievements:[...achievements.children].map(e=>e.innerText),
projects:[...projects.children].map(p=>{
let i=p.querySelectorAll("input,textarea");
return{title:i[0].value,desc:i[1].value};
})
};
localStorage.setItem("portfolio", JSON.stringify(data));
alert("Saved ✅");
}

function load(){
let data=JSON.parse(localStorage.getItem("portfolio")||"{}");

name.value=data.name||"";
bio.value=data.bio||"";

skills.innerHTML="";
(data.skills||[]).forEach(s=>{
skillInput.value=s;
addSkill();
});

achievements.innerHTML="";
(data.achievements||[]).forEach(a=>{
achInput.value=a;
addAchievement();
});

projects.innerHTML="";
(data.projects||[]).forEach(p=>{
addProject();
let i=projects.lastChild.querySelectorAll("input,textarea");
i[0].value=p.title;
i[1].value=p.desc;
});
}

</script>

</body>
</html>
