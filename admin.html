<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#020617;
  color:white;
}

/* LOGIN FULL SCREEN */
.loginPage{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.loginBox{
  background:rgba(15,23,42,0.8);
  padding:30px;
  border-radius:12px;
  width:300px;
}

input{
  width:100%;
  padding:10px;
  margin:10px 0;
  border:none;
  border-radius:6px;
}

button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:6px;
  background:#38bdf8;
  cursor:pointer;
}

/* DASHBOARD */
.dashboard{
  display:none;
}

/* SIDEBAR */
.sidebar{
  width:220px;
  height:100vh;
  background:#020617;
  position:fixed;
  padding:20px;
  border-right:1px solid rgba(255,255,255,0.1);
}

.sidebar h2{
  color:#38bdf8;
}

.sidebar button{
  width:100%;
  margin:10px 0;
  padding:10px;
  background:rgba(255,255,255,0.05);
  color:white;
  border:none;
  border-radius:6px;
}

.sidebar button:hover{
  background:#38bdf8;
  color:black;
}

/* MAIN */
.main{
  margin-left:240px;
  padding:20px;
}

.card{
  background:rgba(15,23,42,0.6);
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
}

.tag{
  display:inline-block;
  background:#38bdf8;
  color:black;
  padding:5px 10px;
  margin:5px;
  border-radius:6px;
  cursor:pointer;
}

.section{display:none;}
.active{display:block;}

</style>
</head>

<body>

<!-- LOGIN PAGE -->
<div class="loginPage" id="loginPage">
  <div class="loginBox">
    <h2>Admin Login</h2>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">

  <div class="sidebar">
    <h2>⚡ Admin</h2>
    <button onclick="show('profile')">Profile</button>
    <button onclick="show('skills')">Skills</button>
    <button onclick="show('projects')">Projects</button>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="main">

    <!-- PROFILE -->
    <div id="profile" class="section active card">
      <h3>Profile</h3>
      <input id="name" placeholder="Name">
      <input id="tagline" placeholder="Title">
      <textarea id="about"></textarea>
      <input id="resume" placeholder="Resume link">
    </div>

    <!-- SKILLS -->
    <div id="skillsSec" class="section card">
      <h3>Skills</h3>
      <div id="skills"></div>
      <input id="newSkill">
      <button onclick="addTag('skills','newSkill')">Add</button>
    </div>

    <!-- PROJECTS -->
    <div id="projectsSec" class="section card">
      <h3>Projects</h3>
      <div id="projects"></div>
      <button onclick="addProject()">Add Project</button>
    </div>

    <button onclick="saveData()">💾 Save</button>

  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc } 
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC_i8vOeQZMdhaKLd32IbwKjUsTlm56Zpc",
  authDomain: "furqaan-portfolio.firebaseapp.com",
  projectId: "furqaan-portfolio"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* NAV */
window.show = function(sec){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(sec==="skills"?"skillsSec":sec==="projects"?"projectsSec":sec).classList.add("active");
}

/* AUTH STATE */
onAuthStateChanged(auth, user=>{
  if(user){
    loginPage.style.display="none";
    dashboard.style.display="block";
    setTimeout(loadData,300);
  }
});

/* LOGIN */
window.login = async ()=>{
  try{
    await signInWithEmailAndPassword(auth,email.value,password.value);
  }catch(e){
    alert("Wrong email or password ❌");
  }
};

/* LOGOUT */
window.logout = async ()=>{
  await signOut(auth);
  location.reload();
};

/* TAG */
window.addTag = function(id,input){
  let v=document.getElementById(input).value;
  if(!v) return;
  let el=document.createElement("span");
  el.className="tag";
  el.innerText=v;
  el.onclick=()=>el.remove();
  document.getElementById(id).appendChild(el);
  document.getElementById(input).value="";
};

/* PROJECT */
window.addProject = function(){
let div=document.createElement("div");
div.className="card";

div.innerHTML=`
<input placeholder="Title">
<input placeholder="Short">
<input placeholder="Image">
<textarea placeholder="Description"></textarea>
<button onclick="this.parentElement.remove()">❌</button>
`;

projects.appendChild(div);
};

/* SAVE */
window.saveData = async function(){

let getTags=id=>[...document.querySelectorAll(`#${id} .tag`)].map(t=>t.innerText);

let data={
name:name.value,
tagline:tagline.value,
about:{intro:about.value},
skills:getTags("skills"),
resume:resume.value,
projects:[...document.querySelectorAll("#projects .card")].map(c=>{
let i=c.querySelectorAll("input,textarea");
return{
title:i[0].value,
short:i[1].value,
image:i[2].value,
description:i[3].value
};
})
};

await setDoc(doc(db,"portfolio","data"),data);
alert("Saved 🚀");
};

/* LOAD */
async function loadData(){
let snap=await getDoc(doc(db,"portfolio","data"));
if(!snap.exists()) return;
let d=snap.data();

name.value=d.name||"";
tagline.value=d.tagline||"";
about.value=d.about?.intro||"";
resume.value=d.resume||"";

skills.innerHTML="";
(d.skills||[]).forEach(v=>{
let el=document.createElement("span");
el.className="tag";
el.innerText=v;
skills.appendChild(el);
});

projects.innerHTML="";
(d.projects||[]).forEach(p=>{
addProject();
let i=projects.lastChild.querySelectorAll("input,textarea");
i[0].value=p.title;
i[1].value=p.short;
i[2].value=p.image;
i[3].value=p.description;
});
}

</script>

</body>
</html>
