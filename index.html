<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Furqan Portfolio</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family: Arial;
    background:#020617;
    color:white;
}

/* BACKGROUND */
.background{
    position:fixed;
    width:100%;
    height:100%;
    background:url("photo.jpg") center/cover no-repeat;
    z-index:-2;
    filter:brightness(0.6);
}

/* HEADER */
header{
    padding:20px;
    text-align:center;
    background:rgba(0,0,0,0.4);
    backdrop-filter:blur(10px);
}

header h1{
    color:#38bdf8;
}

/* HERO */
.hero{
    height:70vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.hero h2{
    font-size:2rem;
}

/* SECTIONS */
section{
    padding:60px 20px;
}

/* PROJECT GRID */
/* 🔥 PREMIUM PROJECT CARDS */

.projects{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:25px;
  margin-top:30px;
}

.card{
  position:relative;
  border-radius:16px;
  overflow:hidden;
  background:rgba(30,41,59,0.4);
  backdrop-filter:blur(12px);
  border:1px solid rgba(56,189,248,0.2);
  transition:0.4s;
  transform:translateY(40px);
  opacity:0;
}

.card.show{
  transform:translateY(0);
  opacity:1;
}

.card:hover{
  transform:translateY(-8px) scale(1.02);
  box-shadow:0 10px 30px rgba(56,189,248,0.3);
}

/* IMAGE */
.card img{
  width:100%;
  height:200px;
  object-fit:cover;
}

/* CONTENT */
.card-content{
  padding:15px;
}

.card h3{
  color:#38bdf8;
  margin-bottom:8px;
}

.card p{
  font-size:14px;
  opacity:0.85;
}

/* TECH TAGS */
.tags{
  margin-top:10px;
}

.tag{
  display:inline-block;
  background:rgba(56,189,248,0.2);
  color:#38bdf8;
  padding:4px 8px;
  margin:3px;
  border-radius:6px;
  font-size:12px;
}

/* BUTTONS */
.buttons{
  margin-top:12px;
}

.buttons a{
  display:inline-block;
  padding:6px 12px;
  margin-right:8px;
  border-radius:6px;
  background:#38bdf8;
  color:#000;
  font-size:13px;
  text-decoration:none;
  transition:0.3s;
}

.buttons a:hover{
  background:#0ea5e9;
}

/* CONTACT */
.contact{
    text-align:center;
}

/* FOOTER */
footer{
    text-align:center;
    padding:20px;
    opacity:0.7;
}
</style>
</head>

<body>

<div class="background"></div>

<header>
<h1 id="name"></h1>
<p id="tagline"></p>
</header>

<section class="hero">
<h2>I build <span id="typing"></span></h2>
</section>

<!-- ABOUT -->
<section>
<h2>About</h2>
<p id="about"></p>
</section>

<!-- PROJECTS -->
<section>
<h2>Projects</h2>
<div id="projects" class="projects"></div>
</section>

<!-- CONTACT -->
<section class="contact">
<h2>Contact</h2>
<p id="contact"></p>
</section>

<footer>© 2026 Furqan</footer>

<script>

/* LOAD CMS DATA */
fetch("content.json")
.then(res=>res.json())
.then(data=>{

// BASIC INFO
document.getElementById("name").innerText=data.name;
document.getElementById("tagline").innerText=data.tagline;
document.getElementById("about").innerText=data.about;
document.getElementById("contact").innerHTML=
`Email: <a href="mailto:${data.contact}">${data.contact}</a>`;

// PROJECTS (UNLIMITED)
let html="";
data.projects.forEach(p=>{
html+=`
<div class="card">
<img src="${p.image}" alt="">
<h3>${p.title}</h3>
<p>${p.description}</p>
</div>
`;
});
document.getElementById("projects").innerHTML=html;

// ANIMATION ON SCROLL
const cards=document.querySelectorAll(".card");

function reveal(){
cards.forEach(c=>{
const top=c.getBoundingClientRect().top;
if(top<window.innerHeight-50){
c.classList.add("show");
}
});
}
window.addEventListener("scroll",reveal);
reveal();

});

/* TYPING EFFECT */
const words=["AI systems","real-world solutions","innovative tech"];
let i=0,j=0,del=false;

function type(){
let el=document.getElementById("typing");
let word=words[i];

if(!del){
el.textContent=word.substring(0,j++);
if(j>word.length){del=true;setTimeout(type,1000);return;}
}else{
el.textContent=word.substring(0,j--);
if(j===0){del=false;i=(i+1)%words.length;}
}
setTimeout(type,del?40:80);
}
type();

</script>

</body>
</html>
