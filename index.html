<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Furqan Portfolio</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Arial;
  background:#020617;
  color:white;
  overflow-x:hidden;
}

/* BACKGROUND */
.background{
  position:fixed;
  width:100%;
  height:100%;
  background:url("photo.jpg") center/cover no-repeat;
  filter:brightness(0.5);
  z-index:-3;
}

/* PARTICLES */
#canvas{
  position:fixed;
  width:100%;
  height:100%;
  z-index:-2;
}

/* HEADER */
header{
  padding:20px;
  text-align:center;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(12px);
}
header h1{color:#38bdf8;}

/* HERO */
.hero{
  height:70vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
}

/* SECTIONS */
section{padding:60px 20px;}

/* GLASS */
.glass{
  background:rgba(15,23,42,0.3);
  backdrop-filter:blur(15px);
  border-radius:12px;
  padding:20px;
}

/* SKILLS */
.skills{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
}
.skill{
  background:rgba(56,189,248,0.2);
  padding:6px 12px;
  border-radius:8px;
}

/* PROJECTS */
.projects{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:20px;
}

.card{
  background:rgba(15,23,42,0.35);
  backdrop-filter:blur(15px);
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
  transition:0.4s;
  opacity:0;
  transform:translateY(40px);
}

.card.show{
  opacity:1;
  transform:translateY(0);
}

.card:hover{
  transform:scale(1.05);
  box-shadow:0 10px 30px rgba(56,189,248,0.3);
}

.card img{
  width:100%;
  height:180px;
  object-fit:cover;
}

.card-content{padding:15px;}

.tag{
  background:rgba(56,189,248,0.2);
  padding:4px 8px;
  margin:3px;
  border-radius:6px;
}

/* MODAL */
#modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  justify-content:center;
  align-items:center;
}

#modalContent{
  width:90%;
  max-width:600px;
  background:#020617;
  padding:20px;
  border-radius:12px;
}

#modalImage{
  width:100%;
  height:200px;
  object-fit:cover;
}

button{
  margin-top:10px;
  padding:8px 12px;
  background:#38bdf8;
  border:none;
  border-radius:6px;
}
</style>
</head>

<body>

<div class="background"></div>
<canvas id="canvas"></canvas>

<header>
<h1 id="name"></h1>
<p id="tagline"></p>
</header>

<section class="hero">
<h2>I build <span id="typing"></span></h2>
</section>

<section class="glass">
<h2>About</h2>
<div id="about"></div>
</section>

<section>
<h2>Skills</h2>
<div id="skills" class="skills"></div>
</section>

<section>
<h2>Projects</h2>
<div id="projects" class="projects"></div>
</section>

<section>
<h2>Contact</h2>
<p id="contact"></p>
</section>

<div id="modal">
<div id="modalContent">
<img id="modalImage">
<h2 id="modalTitle"></h2>
<p id="modalDesc"></p>
<button onclick="closeModal()">Close</button>
</div>
</div>

<script>

// LOAD DATA
document.addEventListener("DOMContentLoaded",()=>{

fetch("content.json")
.then(r=>r.json())
.then(data=>{

name.innerText=data.name;
tagline.innerText=data.tagline;

about.innerHTML=`
<p>${data.about.intro}</p>
<p>${data.about.approach}</p>
<p>${data.about.focus}</p>
`;

contact.innerHTML=`Email: ${data.contact.email}`;

skills.innerHTML=data.skills.map(s=>`<span class="skill">${s}</span>`).join("");

let html="";
data.projects.forEach((p,i)=>{
html+=`
<div class="card" data-i="${i}">
<img src="${p.image}">
<div class="card-content">
<h3>${p.title}</h3>
<p>${p.short}</p>
${p.tech.map(t=>`<span class="tag">${t}</span>`).join("")}
</div>
</div>`;
});
projects.innerHTML=html;

// CLICK
document.querySelectorAll(".card").forEach(c=>{
c.onclick=()=>{
let p=data.projects[c.dataset.i];
openModal(p);
};
});

// SCROLL ANIMATION
function reveal(){
document.querySelectorAll(".card").forEach(c=>{
if(c.getBoundingClientRect().top<window.innerHeight-100){
c.classList.add("show");
}
});
}
window.addEventListener("scroll",reveal);
reveal();

});

});

// MODAL
function openModal(p){
modal.style.display="flex";
modalImage.src=p.image;
modalTitle.innerText=p.title;
modalDesc.innerText=p.description;
}
function closeModal(){
modal.style.display="none";
}

// PARTICLES
const c=document.getElementById("canvas");
const ctx=c.getContext("2d");
c.width=innerWidth;c.height=innerHeight;

let p=[];
for(let i=0;i<40;i++){
p.push({x:Math.random()*c.width,y:Math.random()*c.height,vx:(Math.random()-0.5),vy:(Math.random()-0.5)});
}

function draw(){
ctx.clearRect(0,0,c.width,c.height);

p.forEach(a=>{
a.x+=a.vx;a.y+=a.vy;
ctx.beginPath();
ctx.arc(a.x,a.y,2,0,6.28);
ctx.fillStyle="#38bdf8";
ctx.fill();
});

for(let i=0;i<p.length;i++){
for(let j=i+1;j<p.length;j++){
let dx=p[i].x-p[j].x;
let dy=p[i].y-p[j].y;
if(Math.sqrt(dx*dx+dy*dy)<100){
ctx.beginPath();
ctx.moveTo(p[i].x,p[i].y);
ctx.lineTo(p[j].x,p[j].y);
ctx.strokeStyle="rgba(56,189,248,0.1)";
ctx.stroke();
}
}
}

requestAnimationFrame(draw);
}
draw();

// TYPING
const words=["AI systems","real-world solutions","innovative tech"];
let i=0,j=0,d=false;

function type(){
let w=words[i];
typing.textContent=d?w.substring(0,j--):w.substring(0,j++);
if(j===w.length+1){d=true;setTimeout(type,1000);return;}
if(j===0){d=false;i=(i+1)%words.length;}
setTimeout(type,d?40:80);
}
type();

</script>

</body>
</html>
