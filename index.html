<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Furqan Portfolio</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family: Arial;
    background:#020617;
    color:white;
}

/* BACKGROUND */
.background{
    position:fixed;
    width:100%;
    height:100%;
    background:url("photo.jpg") center/cover no-repeat;
    z-index:-2;
    filter:brightness(0.6);
}

/* HEADER */
header{
    padding:20px;
    text-align:center;
    background:rgba(0,0,0,0.4);
    backdrop-filter:blur(10px);
}

header h1{
    color:#38bdf8;
}

/* HERO */
.hero{
    height:70vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.hero h2{
    font-size:2rem;
}

/* SECTIONS */
section{
    padding:60px 20px;
}

/* PROJECT GRID */
.projects{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:20px;
}

/* CARD */
.card{
    background:rgba(30,41,59,0.4);
    border-radius:12px;
    overflow:hidden;
    backdrop-filter:blur(10px);
    transform:translateY(40px);
    opacity:0;
    transition:0.5s;
}

.card.show{
    transform:translateY(0);
    opacity:1;
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.card h3{
    padding:10px;
    color:#38bdf8;
}

.card p{
    padding:0 10px 15px;
}

/* CONTACT */
.contact{
    text-align:center;
}

/* FOOTER */
footer{
    text-align:center;
    padding:20px;
    opacity:0.7;
}
</style>
</head>

<body>

<div class="background"></div>

<header>
<h1 id="name"></h1>
<p id="tagline"></p>
</header>

<section class="hero">
<h2>I build <span id="typing"></span></h2>
</section>

<!-- ABOUT -->
<section>
<h2>About</h2>
<p id="about"></p>
</section>

<!-- PROJECTS -->
<section>
<h2>Projects</h2>
<div id="projects" class="projects"></div>
</section>

<!-- CONTACT -->
<section class="contact">
<h2>Contact</h2>
<p id="contact"></p>
</section>

<footer>© 2026 Furqan</footer>

<script>

/* LOAD CMS DATA */
fetch("content.json")
.then(res=>res.json())
.then(data=>{

// BASIC INFO
document.getElementById("name").innerText=data.name;
document.getElementById("tagline").innerText=data.tagline;
document.getElementById("about").innerText=data.about;
document.getElementById("contact").innerHTML=
`Email: <a href="mailto:${data.contact}">${data.contact}</a>`;

// PROJECTS (UNLIMITED)
let html="";
data.projects.forEach(p=>{
html+=`
<div class="card">
<img src="${p.image}" alt="">
<h3>${p.title}</h3>
<p>${p.description}</p>
</div>
`;
});
document.getElementById("projects").innerHTML=html;

// ANIMATION ON SCROLL
const cards=document.querySelectorAll(".card");

function reveal(){
cards.forEach(c=>{
const top=c.getBoundingClientRect().top;
if(top<window.innerHeight-50){
c.classList.add("show");
}
});
}
window.addEventListener("scroll",reveal);
reveal();

});

/* TYPING EFFECT */
const words=["AI systems","real-world solutions","innovative tech"];
let i=0,j=0,del=false;

function type(){
let el=document.getElementById("typing");
let word=words[i];

if(!del){
el.textContent=word.substring(0,j++);
if(j>word.length){del=true;setTimeout(type,1000);return;}
}else{
el.textContent=word.substring(0,j--);
if(j===0){del=false;i=(i+1)%words.length;}
}
setTimeout(type,del?40:80);
}
type();

</script>

</body>
</html>
