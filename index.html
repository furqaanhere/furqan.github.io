<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Furqan Portfolio</title>

<style>

/* 🔥 MODAL UPGRADE */

#modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.82);
  justify-content:center;
  align-items:center;
  z-index:1000;
  padding:20px;
}

#modalContent{
  width:min(700px, 100%);
  max-height:90vh;
  overflow-y:auto;
  background:rgba(15,23,42,0.35);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(56,189,248,0.2);
  border-radius:18px;
  padding:20px;
  box-shadow:0 10px 40px rgba(0,0,0,0.35);
}

#modalImage{
  width:100%;
  height:240px;
  object-fit:cover;
  border-radius:12px;
  margin-bottom:15px;
}

#modalTitle{
  color:#38bdf8;
  margin-bottom:10px;
}

#modalShort{
  opacity:0.9;
  margin-bottom:10px;
}

#modalDesc{
  margin-bottom:14px;
  line-height:1.6;
}

.modal-tags{
  margin-top:12px;
  margin-bottom:16px;
}

.modal-buttons{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:10px;
  margin-bottom:12px;
}

.modal-buttons a,
.close-btn{
  display:inline-block;
  padding:8px 14px;
  border-radius:8px;
  background:#38bdf8;
  color:#000;
  text-decoration:none;
  border:none;
  cursor:pointer;
  font-size:14px;
}

.modal-buttons a:hover,
.close-btn:hover{
  background:#0ea5e9;
}
body{
    font-family: Arial;
    background:#020617;
    color:white;
    touch-action: manipulation;
}

/* BACKGROUND */
.background{
    position:fixed;
    width:100%;
    height:100%;
    background:url("photo.jpg") center/cover no-repeat;
    z-index:-3;
    filter:brightness(0.6);
}

#particleCanvas{
  position:fixed;
  width:100%;
  height:100%;
  z-index:-2;
}

/* HEADER */
header{
    padding:20px;
    text-align:center;
    background:rgba(0,0,0,0.3);
    backdrop-filter:blur(15px);
}

header h1{color:#38bdf8;}

/* HERO */
.hero{
    height:70vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

/* SECTION */
section{padding:60px 20px;}

/* GLASS */
details{
  background:rgba(15,23,42,0.25);
  padding:15px;
  border-radius:10px;
  backdrop-filter:blur(15px);
}

/* PROJECTS */
.projects{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:25px;
}

/* 🔥 3D CARD */
.card{
  border-radius:16px;
  background:rgba(15,23,42,0.25);
  backdrop-filter:blur(20px);
  border:1px solid rgba(56,189,248,0.2);
  overflow:hidden;
  transition:transform 0.2s ease;
  transform-style:preserve-3d;
  perspective:1000px;
  opacity:0;
  transform:translateY(40px);
}

.card.show{
  opacity:1;
  transform:translateY(0);
}

.card img{
  width:100%;
  height:200px;
  object-fit:cover;
}

.card-content{padding:15px;}

.tag{
  background:rgba(56,189,248,0.2);
  padding:4px 8px;
  margin:3px;
  border-radius:6px;
}

/* SKILLS */
.skills{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
}

.skill{
  background:rgba(56,189,248,0.2);
  padding:6px 12px;
  border-radius:8px;
}

/* MODAL */
#modal{
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
  z-index:1000;
}

#modalContent{
  background:rgba(15,23,42,0.3);
  backdrop-filter:blur(20px);
  padding:20px;
  border-radius:10px;
  max-width:500px;
}
</style>
</head>

<body>

<div class="background"></div>
<canvas id="particleCanvas"></canvas>

<header>
<h1 id="name"></h1>
<p id="tagline"></p>
</header>

<section class="hero">
<h2>I build <span id="typing"></span></h2>
</section>

<section>
<h2>About</h2>
<details>
<summary>Click to expand</summary>
<div id="about"></div>
</details>
</section>

<section>
<h2>Skills</h2>
<div id="skills" class="skills"></div>
</section>

<section>
<h2>Projects</h2>
<div id="projects" class="projects"></div>
</section>

<section>
<h2>Contact</h2>
<p id="contact"></p>
</section>

<!-- MODAL -->

<div id="modal">
  <div id="modalContent">

    <img id="modalImage" src="" alt="">

    <h2 id="modalTitle"></h2>
    <p id="modalShort"></p>
    <p id="modalDesc"></p>

    <p><b>Problem:</b> <span id="modalProblem"></span></p>
    <p><b>Solution:</b> <span id="modalSolution"></span></p>
    <p><b>System:</b> <span id="modalSystem"></span></p>
    <p><b>Impact:</b> <span id="modalImpact"></span></p>

    <div id="modalTech" class="modal-tags"></div>

    <div class="modal-buttons">
      <a id="modalGithub" target="_blank">GitHub</a>
      <a id="modalDemo" target="_blank">Demo</a>
    </div>

    <button class="close-btn" onclick="closeModal()">Close</button>

  </div>
</div>
<script>

// LOAD DATA
fetch("content.json")
.then(res=>res.json())
.then(data=>{

document.getElementById("name").innerText=data.name;
document.getElementById("tagline").innerText=data.tagline;

document.getElementById("about").innerHTML=`
<p>${data.about.intro}</p>
<p>${data.about.approach}</p>
<p>${data.about.focus}</p>
`;

document.getElementById("contact").innerHTML=
`Email: <a href="mailto:${data.contact.email}">${data.contact.email}</a><br>
<a href="${data.contact.linkedin}" target="_blank">LinkedIn</a>`;

// SKILLS
let skillHTML="";
data.skills.forEach(s=>{
skillHTML+=`<span class="skill">${s}</span>`;
});
document.getElementById("skills").innerHTML=skillHTML;

// PROJECTS
let html="";
data.projects.forEach(p=>{
html+=`
<div class="card" onclick='openModal(${JSON.stringify(p)})'>
<img src="${p.image}" onerror="this.src='photo.jpg'">
<div class="card-content">
<h3>${p.title}</h3>
<p>${p.short}</p>
<div>${(p.tech||[]).map(t=>`<span class="tag">${t}</span>`).join("")}</div>
</div>
</div>
`;
});
document.getElementById("projects").innerHTML=html;

// SCROLL ANIMATION
function reveal(){
document.querySelectorAll(".card").forEach(c=>{
if(c.getBoundingClientRect().top<window.innerHeight-120){
c.classList.add("show");
}
});
}
window.addEventListener("scroll",reveal);
reveal();

// 🔥 3D TILT EFFECT
document.querySelectorAll(".card").forEach(card=>{
card.addEventListener("mousemove",e=>{
let rect=card.getBoundingClientRect();
let x=e.clientX-rect.left;
let y=e.clientY-rect.top;

let rotateX=-(y-rect.height/2)/10;
let rotateY=(x-rect.width/2)/10;

card.style.transform=`rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
});

card.addEventListener("mouseleave",()=>{
card.style.transform="rotateX(0) rotateY(0)";
});
});

});

// MODAL
let modalOpen=false;

let modalOpen=false;
// 🔥 NEW MODAL SYSTEM

function openModal(p){

  const modal = document.getElementById("modal");
modal.style.display = "flex";

setTimeout(()=>{
  modal.classList.add("active");
},10);

  // IMAGE
  const img = document.getElementById("modalImage");
  img.src = p.image || "photo.jpg";
  img.onerror = () => img.src = "photo.jpg";

  // TEXT
  document.getElementById("modalTitle").innerText = p.title || "";
  document.getElementById("modalShort").innerText = p.short || "";
  document.getElementById("modalDesc").innerText = p.description || "";

  document.getElementById("modalProblem").innerText = p.problem || "";
  document.getElementById("modalSolution").innerText = p.solution || "";
  document.getElementById("modalSystem").innerText = p.system || "";
  document.getElementById("modalImpact").innerText = p.impact || "";

  // TECH TAGS
  document.getElementById("modalTech").innerHTML =
    (p.tech || []).map(t => `<span class="tag">${t}</span>`).join("");

  // BUTTONS
  const github = document.getElementById("modalGithub");
  const demo = document.getElementById("modalDemo");

  if(p.github){
    github.href = p.github;
    github.style.display = "inline-block";
  } else {
    github.style.display = "none";
  }

  if(p.demo){
    demo.href = p.demo;
    demo.style.display = "inline-block";
  } else {
    demo.style.display = "none";
  }
}

function closeModal(){
  const modal = document.getElementById("modal");

  modal.classList.remove("active");

  setTimeout(()=>{
    modal.style.display = "none";
  },300);
}

// CLOSE ON OUTSIDE CLICK
document.getElementById("modal").addEventListener("click",(e)=>{
  if(e.target.id==="modal"){
    closeModal();
  }
});
// CLICK OUTSIDE
document.getElementById("modal").addEventListener("click",e=>{
if(e.target.id==="modal") closeModal();
});

// PARTICLES (OPTIMIZED)
const canvas=document.getElementById("particleCanvas");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

let particles=[];
for(let i=0;i<35;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
vx:(Math.random()-0.5),
vy:(Math.random()-0.5)
});
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{
p.x+=p.vx;
p.y+=p.vy;

ctx.beginPath();
ctx.arc(p.x,p.y,2,0,Math.PI*2);
ctx.fillStyle="#38bdf8";
ctx.fill();
});

for(let i=0;i<particles.length;i++){
for(let j=i+1;j<i+4;j++){
let dx=particles[i].x-particles[j]?.x;
let dy=particles[i].y-particles[j]?.y;
let dist=Math.sqrt(dx*dx+dy*dy);

if(dist<100){
ctx.beginPath();
ctx.moveTo(particles[i].x,particles[i].y);
ctx.lineTo(particles[j].x,particles[j].y);
ctx.strokeStyle="rgba(56,189,248,0.1)";
ctx.stroke();
}
}
}

requestAnimationFrame(animate);
}
animate();

// TYPING
const words=["AI systems","real-world solutions","innovative tech"];
let i=0,j=0,del=false;

function type(){
let el=document.getElementById("typing");
let word=words[i];

if(!del){
el.textContent=word.substring(0,j++);
if(j>word.length){del=true;setTimeout(type,1000);return;}
}else{
el.textContent=word.substring(0,j--);
if(j===0){del=false;i=(i+1)%words.length;}
}
setTimeout(type,del?40:80);
}
type();

</script>

</body>
</html>
