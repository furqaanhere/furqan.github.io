<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Portfolio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #020617;
      color: white;
      text-align: center;
    }

    .container {
      padding: 100px 20px;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 10px;
    }

    p {
      color: #94a3b8;
    }

    .btn {
      display: inline-block;
      margin-top: 30px;
      padding: 12px 28px;
      background: linear-gradient(45deg, #00f5ff, #7b2ff7);
      color: white;
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.05);
    }

    .disabled {
      opacity: 0.4;
      pointer-events: none;
    }

    .status {
      margin-top: 15px;
      font-size: 14px;
      color: #94a3b8;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>My Portfolio</h1>
    <p>Welcome to my personal website</p>

    <!-- Resume Button -->
    <a id="resumeBtn" class="btn">Download Resume</a>

    <!-- Status -->
    <div id="statusText" class="status"></div>
  </div>

  <script>
    const btn = document.getElementById("resumeBtn");
    const statusText = document.getElementById("statusText");

    const resume = localStorage.getItem("resume");

    if (resume) {
      btn.href = resume;
      btn.download = "My_Resume";
      statusText.innerText = "✅ Resume available";
    } else {
      btn.innerText = "No Resume Uploaded";
      btn.classList.add("disabled");
      statusText.innerText = "❌ No resume uploaded by admin";
    }
  </script>

</body>
</html>
