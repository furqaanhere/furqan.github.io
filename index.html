<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Furqan AI System</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Segoe UI',sans-serif;
  background:#020617;
  color:white;
  overflow-x:hidden;
}

/* BACKGROUND */
body::before{
  content:"";
  position:fixed;
  width:200%;
  height:200%;
  background:radial-gradient(circle at 20% 30%, #0ea5e9, transparent 40%),
             radial-gradient(circle at 80% 70%, #6366f1, transparent 40%);
  animation:bg 15s infinite linear;
  opacity:0.2;
  z-index:-3;
}
@keyframes bg{
  0%{transform:translate(0,0);}
  50%{transform:translate(-10%,-10%);}
  100%{transform:translate(0,0);}
}

/* GLASS */
.glass{
  background:rgba(15,23,42,0.4);
  backdrop-filter:blur(20px);
  border-radius:16px;
  padding:20px;
  border:1px solid rgba(255,255,255,0.1);
  margin:20px;
}

/* HEADER */
header{text-align:center;padding:20px;}
.system{color:#38bdf8;margin-bottom:10px;}

/* HERO */
.hero{
  height:70vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:20px;
}

/* SKILLS */
.skill{
  padding:8px 12px;
  background:rgba(255,255,255,0.05);
  border-radius:8px;
}

/* CARD */
.card{
  border-radius:16px;
  overflow:hidden;
  cursor:pointer;
  transition:0.3s;
}
.card:hover{transform:translateY(-10px);}
.card img{
  width:100%;
  height:200px;
  object-fit:cover;
}
.card-content{padding:15px;}

.tag{
  background:rgba(255,255,255,0.1);
  padding:4px 8px;
  border-radius:6px;
}

/* MODAL */
#modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  justify-content:center;
  align-items:center;
}
#modalContent{
  width:90%;
  max-width:600px;
  background:#020617;
  padding:20px;
  border-radius:12px;
}

button{
  padding:8px 12px;
  border:none;
  background:#0ea5e9;
  border-radius:6px;
  margin-top:10px;
}

a{color:#0ea5e9;text-decoration:none;}
</style>
</head>

<body>

<header>
<div class="system">● SYSTEM ONLINE | AI MODULE ACTIVE</div>
<h1 id="name"></h1>
<p id="tagline"></p>
</header>

<section class="hero">
<h2>I build <span id="typing"></span></h2>
</section>

<div class="grid">

<div class="glass">
<h2>About</h2>
<div id="about"></div>
</div>

<div class="glass">
<h2>Skills</h2>
<div id="skills"></div>
</div>

<div class="glass" style="grid-column:span 2;">
<h2>Projects</h2>
<div id="projects" class="grid"></div>
</div>

<div class="glass">
<h2>Contact</h2>
<div id="contact"></div>
</div>

</div>

<!-- MODAL -->
<div id="modal">
<div id="modalContent">
<img id="modalImage" style="width:100%;height:200px;">
<h2 id="modalTitle"></h2>
<p id="modalDesc"></p>
<button onclick="closeModal()">Close</button>
</div>
</div>

<script>

// 🔥 ADMIN + JSON LOADER (YOUR CODE ADDED HERE)
let local = localStorage.getItem("data");

if(local){
  loadData(JSON.parse(local));
}else{
  fetch("content.json")
  .then(r=>r.json())
  .then(loadData);
}

// 🔥 MAIN RENDER FUNCTION
function loadData(data){

document.getElementById("name").innerText=data.name;
document.getElementById("tagline").innerText=data.tagline;

document.getElementById("about").innerHTML=`
<p>${data.about.intro}</p>
<p>${data.about.approach}</p>
<p>${data.about.focus}</p>
`;

document.getElementById("contact").innerHTML=`
<p>Email: <a href="mailto:${data.contact.email}">${data.contact.email}</a></p>
<p><a href="${data.contact.linkedin}" target="_blank">LinkedIn</a></p>
`;

document.getElementById("skills").innerHTML=
data.skills.map(s=>`<div class="skill">${s}</div>`).join("");

document.getElementById("projects").innerHTML=
data.projects.map((p,i)=>`
<div class="card" onclick='openModal(${JSON.stringify(p)})'>
<img src="${p.image}" onerror="this.src='photo.jpg'">
<div class="card-content">
<h3>${p.title}</h3>
<p>${p.short}</p>
${p.tech.map(t=>`<span class="tag">${t}</span>`).join("")}
</div>
</div>
`).join("");

}

// MODAL
function openModal(p){
modal.style.display="flex";
modalImage.src=p.image;
modalTitle.innerText=p.title;
modalDesc.innerText=p.description;
}
function closeModal(){
modal.style.display="none";
}

// TYPING
const words=["AI systems","future tech","intelligent solutions"];
let i=0,j=0,d=false;

(function t(){
let w=words[i];
typing.textContent=d?w.substring(0,j--):w.substring(0,j++);
if(j===w.length+1){d=true;setTimeout(t,1000);return;}
if(j===0){d=false;i=(i+1)%words.length;}
setTimeout(t,d?40:80);
})();
</script>

</body>
</html>
