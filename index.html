<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Furqan AI Portfolio</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family: 'Segoe UI', sans-serif;
  background:#020617;
  color:white;
  overflow-x:hidden;
}

/* 🌈 ANIMATED BACKGROUND */
body::before{
  content:"";
  position:fixed;
  width:200%;
  height:200%;
  background:radial-gradient(circle at 20% 30%, #0ea5e9, transparent 40%),
             radial-gradient(circle at 80% 70%, #6366f1, transparent 40%);
  animation:bgMove 12s infinite linear;
  z-index:-3;
  opacity:0.2;
}

@keyframes bgMove{
  0%{transform:translate(0,0);}
  50%{transform:translate(-10%, -10%);}
  100%{transform:translate(0,0);}
}

/* 🧊 GLASS */
.glass{
  background:rgba(15,23,42,0.4);
  backdrop-filter:blur(20px);
  border-radius:16px;
  padding:25px;
  border:1px solid rgba(255,255,255,0.1);
  transition:0.3s;
}

/* HEADER */
header{
  text-align:center;
  padding:20px;
}

/* HERO */
.hero{
  height:80vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

/* SECTIONS */
section{
  padding:80px 20px;
  opacity:0;
  transform:translateY(50px);
  transition:0.8s;
}
section.show{
  opacity:1;
  transform:translateY(0);
}

/* SKILLS */
.skills{
  display:flex;
  flex-wrap:wrap;
  gap:12px;
  justify-content:center;
}
.skill{
  padding:8px 16px;
  border-radius:10px;
  background:rgba(255,255,255,0.05);
  transition:0.3s;
}
.skill:hover{
  transform:translateY(-5px);
}

/* PROJECTS */
.projects{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:25px;
}

.card{
  border-radius:16px;
  overflow:hidden;
  transition:0.3s;
  cursor:pointer;
  transform-style:preserve-3d;
}

.card:hover{
  transform:translateY(-10px) scale(1.03);
}

.card img{
  width:100%;
  height:200px;
  object-fit:cover;
}

.card-content{padding:15px;}

.tag{
  background:rgba(255,255,255,0.1);
  padding:5px 8px;
  border-radius:6px;
}

/* MODAL */
#modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  justify-content:center;
  align-items:center;
}

#modalContent{
  width:90%;
  max-width:600px;
  background:#020617;
  padding:20px;
  border-radius:12px;
}

/* BUTTON */
button{
  padding:10px 16px;
  border:none;
  border-radius:8px;
  background:#0ea5e9;
  cursor:pointer;
  transition:0.3s;
}
button:hover{
  transform:scale(1.05);
}

/* LINKS */
a{color:#0ea5e9;text-decoration:none;}
</style>
</head>

<body>

<header>
<h1 id="name"></h1>
<p id="tagline"></p>
</header>

<section class="hero show">
<h2>I build <span id="typing"></span></h2>
</section>

<section class="glass">
<h2>About</h2>
<div id="about"></div>
</section>

<section>
<h2>Skills</h2>
<div id="skills" class="skills"></div>
</section>

<section>
<h2>Projects</h2>
<div id="projects" class="projects"></div>
</section>

<section>
<h2>Contact</h2>
<div id="contact"></div>
</section>

<div id="modal">
<div id="modalContent">
<img id="modalImage" style="width:100%;height:200px;">
<h2 id="modalTitle"></h2>
<p id="modalDesc"></p>
<button onclick="closeModal()">Close</button>
</div>
</div>

<script>

// LOAD
document.addEventListener("DOMContentLoaded",()=>{

fetch("content.json")
.then(r=>r.json())
.then(data=>{

name.innerText=data.name;
tagline.innerText=data.tagline;

about.innerHTML=`
<p>${data.about.intro}</p>
<p>${data.about.approach}</p>
<p>${data.about.focus}</p>
`;

contact.innerHTML=`
<p>Email: <a href="mailto:${data.contact.email}">${data.contact.email}</a></p>
<p><a href="${data.contact.linkedin}" target="_blank">LinkedIn</a></p>
`;

skills.innerHTML=data.skills.map(s=>`<span class="skill">${s}</span>`).join("");

projects.innerHTML=data.projects.map((p,i)=>`
<div class="card" onclick='openModal(${JSON.stringify(p)})'>
<img src="${p.image}">
<div class="card-content">
<h3>${p.title}</h3>
<p>${p.short}</p>
${p.tech.map(t=>`<span class="tag">${t}</span>`).join("")}
</div>
</div>
`).join("");

// REVEAL
const sections=document.querySelectorAll("section");
window.addEventListener("scroll",()=>{
sections.forEach(s=>{
if(s.getBoundingClientRect().top<window.innerHeight-100){
s.classList.add("show");
}
});
});

});

});

// MODAL
function openModal(p){
modal.style.display="flex";
modalImage.src=p.image;
modalTitle.innerText=p.title;
modalDesc.innerText=p.description;
}
function closeModal(){
modal.style.display="none";
}

// TYPING
const words=["AI systems","future tech","smart solutions"];
let i=0,j=0,d=false;

(function t(){
let w=words[i];
typing.textContent=d?w.substring(0,j--):w.substring(0,j++);
if(j===w.length+1){d=true;setTimeout(t,1000);return;}
if(j===0){d=false;i=(i+1)%words.length;}
setTimeout(t,d?40:80);
})();
</script>

</body>
</html>
