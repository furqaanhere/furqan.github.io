<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Furqan Portfolio</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Arial;
  background:#020617;
  color:white;
}

/* BACKGROUND */
.background{
  position:fixed;
  width:100%;
  height:100%;
  background:url("photo.jpg") center/cover no-repeat;
  z-index:-3;
  filter:brightness(0.6);
}

#particleCanvas{
  position:fixed;
  width:100%;
  height:100%;
  z-index:-2;
}

/* HEADER */
header{
  padding:20px;
  text-align:center;
  background:rgba(0,0,0,0.3);
  backdrop-filter:blur(15px);
}
header h1{color:#38bdf8;}

/* HERO */
.hero{
  height:60vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

/* SECTION */
section{padding:50px 20px;}

/* ABOUT */
details{
  background:rgba(15,23,42,0.3);
  padding:15px;
  border-radius:10px;
}

/* SKILLS */
.skills{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:center;
}

.skill{
  background:rgba(56,189,248,0.2);
  padding:6px 12px;
  border-radius:8px;
}

/* PROJECTS */
.projects{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:20px;
}

.card{
  background:rgba(15,23,42,0.3);
  border-radius:12px;
  overflow:hidden;
  transition:0.3s;
  cursor:pointer;
}

.card:hover{
  transform:scale(1.03);
}

.card img{
  width:100%;
  height:180px;
  object-fit:cover;
}

.card-content{padding:15px;}

.tag{
  background:rgba(56,189,248,0.2);
  padding:4px 8px;
  margin:3px;
  border-radius:6px;
  display:inline-block;
}

/* MODAL */
#modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
  z-index:1000;
}

#modalContent{
  width:90%;
  max-width:600px;
  background:#020617;
  padding:20px;
  border-radius:12px;
}

#modalImage{
  width:100%;
  height:200px;
  object-fit:cover;
  margin-bottom:10px;
}

button{
  margin-top:10px;
  padding:8px 12px;
  border:none;
  background:#38bdf8;
  color:black;
  border-radius:6px;
}
</style>
</head>

<body>

<div class="background"></div>
<canvas id="particleCanvas"></canvas>

<header>
<h1 id="name"></h1>
<p id="tagline"></p>
</header>

<section class="hero">
<h2>I build <span id="typing"></span></h2>
</section>

<section>
<h2>About</h2>
<details>
<summary>Click to expand</summary>
<div id="about"></div>
</details>
</section>

<section>
<h2>Skills</h2>
<div id="skills" class="skills"></div>
</section>

<section>
<h2>Projects</h2>
<div id="projects" class="projects"></div>
</section>

<section>
<h2>Contact</h2>
<p id="contact"></p>
</section>

<!-- MODAL -->
<div id="modal">
  <div id="modalContent">
    <img id="modalImage">
    <h2 id="modalTitle"></h2>
    <p id="modalDesc"></p>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<script>

// ✅ FIXED: Wait for DOM
document.addEventListener("DOMContentLoaded", ()=>{

fetch("content.json")
.then(res=>res.json())
.then(data=>{

// BASIC INFO
document.getElementById("name").innerText=data.name;
document.getElementById("tagline").innerText=data.tagline;

// ABOUT
document.getElementById("about").innerHTML=`
<p>${data.about.intro}</p>
<p>${data.about.approach}</p>
<p>${data.about.focus}</p>
`;

// CONTACT
document.getElementById("contact").innerHTML=
`Email: ${data.contact.email}`;

// SKILLS
document.getElementById("skills").innerHTML=
data.skills.map(s=>`<span class="skill">${s}</span>`).join("");

// PROJECTS
document.getElementById("projects").innerHTML=
data.projects.map(p=>`
<div class="card" onclick='openModal(${JSON.stringify(p)})'>
<img src="${p.image}">
<div class="card-content">
<h3>${p.title}</h3>
<p>${p.short}</p>
${(p.tech||[]).map(t=>`<span class="tag">${t}</span>`).join("")}
</div>
</div>
`).join("");

});

});

// MODAL
function openModal(p){
document.getElementById("modal").style.display="flex";
modalImage.src=p.image;
modalTitle.innerText=p.title;
modalDesc.innerText=p.description;
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

// PARTICLES
const c=document.getElementById("particleCanvas");
const ctx=c.getContext("2d");
c.width=innerWidth;c.height=innerHeight;

let p=[];
for(let i=0;i<30;i++){
p.push({x:Math.random()*c.width,y:Math.random()*c.height,vx:(Math.random()-0.5),vy:(Math.random()-0.5)});
}

function draw(){
ctx.clearRect(0,0,c.width,c.height);
p.forEach(a=>{
a.x+=a.vx;a.y+=a.vy;
ctx.beginPath();ctx.arc(a.x,a.y,2,0,6.28);
ctx.fillStyle="#38bdf8";ctx.fill();
});
requestAnimationFrame(draw);
}
draw();

// TYPING
const words=["AI systems","real-world solutions","innovative tech"];
let i=0,j=0,d=false;
(function t(){
let w=words[i];
typing.textContent=d?w.substring(0,j--):w.substring(0,j++);
if(j===w.length+1){d=true;setTimeout(t,1000);return;}
if(j===0){d=false;i=(i+1)%words.length;}
setTimeout(t,d?40:80);
})();

</script>

</body>
</html>
