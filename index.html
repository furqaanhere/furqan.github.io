<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Furqan Portfolio</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:Arial;
  background:#020617;
  color:white;
  overflow-x:hidden;
}

/* BACKGROUND */
.background{
  position:fixed;
  width:100%;
  height:100%;
  background:url("photo.jpg") center/cover no-repeat;
  z-index:-3;
  transform:translateZ(0);
  filter:brightness(0.5);
}

/* PARALLAX */
body:hover .background{
  transform:scale(1.05);
}

/* CURSOR GLOW */
.cursor{
  position:fixed;
  width:200px;
  height:200px;
  background:radial-gradient(circle,#38bdf8 0%,transparent 70%);
  pointer-events:none;
  mix-blend-mode:screen;
  opacity:0.3;
  z-index:1000;
}

/* HEADER */
header{
  text-align:center;
  padding:20px;
  background:rgba(0,0,0,0.3);
  backdrop-filter:blur(10px);
}

header h1{
  color:#38bdf8;
  text-shadow:0 0 10px #38bdf8;
}

/* HERO */
.hero{
  height:70vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

/* SECTION */
section{
  padding:60px 20px;
  opacity:0;
  transform:translateY(40px);
  transition:0.6s;
}

section.show{
  opacity:1;
  transform:translateY(0);
}

/* GLASS */
.glass{
  background:rgba(15,23,42,0.3);
  backdrop-filter:blur(20px);
  border-radius:12px;
  padding:15px;
  box-shadow:0 0 20px rgba(56,189,248,0.1);
}

/* SKILLS */
.skills{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:center;
}

.skill{
  background:rgba(56,189,248,0.2);
  padding:6px 12px;
  border-radius:8px;
}

/* PROJECTS */
.projects{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:20px;
}

.card{
  background:rgba(15,23,42,0.3);
  backdrop-filter:blur(20px);
  border-radius:12px;
  overflow:hidden;
  transition:0.3s;
  transform-style:preserve-3d;
}

.card:hover{
  transform:rotateY(6deg) rotateX(6deg) scale(1.02);
}

.card img{
  width:100%;
  height:200px;
  object-fit:cover;
}

.card-content{padding:10px;}

/* MODAL */
#modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
}

#modalContent{
  background:#020617;
  padding:20px;
  border-radius:10px;
  max-width:500px;
}

/* BUTTON */
button{
  background:#38bdf8;
  border:none;
  padding:10px;
  border-radius:6px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="background"></div>
<div class="cursor" id="cursor"></div>

<header>
<h1 id="name"></h1>
<p id="tagline"></p>
</header>

<section class="hero">
<h2>I build <span id="typing"></span></h2>
</section>

<section>
<h2>About</h2>
<div id="about" class="glass"></div>
</section>

<section>
<h2>Skills</h2>
<div id="skills" class="skills"></div>
</section>

<section>
<h2>Projects</h2>
<div id="projects" class="projects"></div>
</section>

<section>
<h2>Contact</h2>
<p id="contact"></p>
</section>

<!-- MODAL -->
<div id="modal">
<div id="modalContent">
<h3 id="modalTitle"></h3>
<p id="modalDesc"></p>
<button onclick="closeModal()">Close</button>
</div>
</div>
