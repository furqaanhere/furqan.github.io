<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Furqan Portfolio</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Arial;
  background:#020617;
  color:white;
  overflow-x:hidden;
}

/* BACKGROUND */
.background{
  position:fixed;
  width:110%;
  height:110%;
  top:-5%;
  left:-5%;
  background:url("photo.jpg") center/cover no-repeat;
  z-index:-3;
  filter:brightness(0.6);
}

/* PARTICLES */
#particleCanvas{
  position:fixed;
  width:100%;
  height:100%;
  z-index:-2;
}

/* CURSOR */
.cursor{
  position:fixed;
  width:15px;
  height:15px;
  background:#38bdf8;
  border-radius:50%;
  pointer-events:none;
  mix-blend-mode:screen;
  z-index:1000;
}

/* HEADER */
header{
  padding:20px;
  text-align:center;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(10px);
}

/* HERO */
.hero{
  height:70vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

/* SECTIONS */
section{
  padding:60px 20px;
}

/* ANIMATION */
.fade{
  opacity:0;
  transform:translateY(40px);
  transition:1s ease;
}
.fade.show{
  opacity:1;
  transform:translateY(0);
}

/* PROJECTS */
.projects{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:25px;
}

.card{
  background:rgba(15,23,42,0.4);
  backdrop-filter:blur(15px);
  border-radius:12px;
  overflow:hidden;
  transition:0.3s;
  transform-style:preserve-3d;
}

.card:hover{
  transform:scale(1.05);
}

.card img{
  width:100%;
  height:200px;
  object-fit:cover;
}

.card-content{padding:15px;}

.tag{
  background:rgba(56,189,248,0.2);
  padding:4px 8px;
  margin:3px;
  border-radius:6px;
  display:inline-block;
}

/* MODAL */
#modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
}

#modalContent{
  background:#020617;
  padding:20px;
  border-radius:10px;
  max-width:500px;
}
</style>
</head>

<body>

<div class="background"></div>
<canvas id="particleCanvas"></canvas>

<header>
<h1 id="name"></h1>
<p id="tagline"></p>
</header>

<section class="hero fade">
<h2>I build <span id="typing"></span></h2>
</section>

<section class="fade">
<h2>About</h2>
<p id="about"></p>
</section>

<section class="fade">
<h2>Skills</h2>
<div id="skills"></div>
</section>

<section class="fade">
<h2>Projects</h2>
<div id="projects" class="projects"></div>
</section>

<section class="fade">
<h2>Contact</h2>
<p id="contact"></p>
</section>

<div id="modal">
<div id="modalContent">
<h3 id="modalTitle"></h3>
<p id="modalDesc"></p>
<button onclick="closeModal()">Close</button>
</div>
</div>

<script>

// CURSOR
let cursor=document.createElement("div");
cursor.className="cursor";
document.body.appendChild(cursor);

document.addEventListener("mousemove",e=>{
cursor.style.left=e.clientX+"px";
cursor.style.top=e.clientY+"px";
});

// SCROLL ANIMATION
const faders=document.querySelectorAll(".fade");

window.addEventListener("scroll",()=>{
faders.forEach(el=>{
if(el.getBoundingClientRect().top<window.innerHeight-50){
el.classList.add("show");
}
});
});

// TYPING
const words=["AI systems","real-world solutions","innovative tech"];
let i=0,j=0,del=false;

function type(){
let el=document.getElementById("typing");
let word=words[i];

if(!del){
el.textContent=word.substring(0,j++);
if(j>word.length){del=true;setTimeout(type,1000);return;}
}else{
el.textContent=word.substring(0,j--);
if(j===0){del=false;i=(i+1)%words.length;}
}
setTimeout(type,del?40:80);
}
type();

// LOAD DATA
fetch("content.json")
.then(r=>r.json())
.then(d=>{

name.innerText=d.name;
tagline.innerText=d.tagline;
about.innerText=d.about.intro;

skills.innerHTML=d.skills.map(s=>`<span class="tag">${s}</span>`).join("");

contact.innerHTML=`
Email: <a href="mailto:${d.contact.email}">${d.contact.email}</a><br>
<a href="${d.contact.linkedin}" target="_blank">LinkedIn</a>
`;

let html="";
d.projects.forEach(p=>{
html+=`
<div class="card" onclick="openModal('${p.title}','${p.description}')">
<img src="${p.image}" onerror="this.src='photo.jpg'">
<div class="card-content">
<h3>${p.title}</h3>
<p>${p.short}</p>
</div>
</div>
`;
});
projects.innerHTML=html;

});

// MODAL
function openModal(t,d){
modal.style.display="flex";
modalTitle.innerText=t;
modalDesc.innerText=d;
}

function closeModal(){
modal.style.display="none";
}

// PARTICLES
const canvas=document.getElementById("particleCanvas");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

let particles=[];
for(let i=0;i<40;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
vx:(Math.random()-0.5),
vy:(Math.random()-0.5)
});
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{
p.x+=p.vx;
p.y+=p.vy;

ctx.beginPath();
ctx.arc(p.x,p.y,2,0,Math.PI*2);
ctx.fillStyle="#38bdf8";
ctx.fill();
});

requestAnimationFrame(animate);
}
animate();

</script>

</body>
</html>
