<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Furqan Portfolio</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family: Arial;
    background:#020617;
    color:white;
}

/* BACKGROUND */
.background{
    position:fixed;
    width:100%;
    height:100%;
    background:url("photo.jpg") center/cover no-repeat;
    z-index:-3;
    filter:brightness(0.6);
}

#particleCanvas{
  position:fixed;
  width:100%;
  height:100%;
  z-index:-2;
}

/* HEADER */
header{
    padding:20px;
    text-align:center;
    background:rgba(0,0,0,0.3);
    backdrop-filter:blur(15px);
}

header h1{
    color:#38bdf8;
}

/* HERO */
.hero{
    height:70vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
}

/* SECTION */
section{
    padding:60px 20px;
}

/* GLASS DETAILS */
details{
  background:rgba(15,23,42,0.25);
  padding:15px;
  border-radius:10px;
  backdrop-filter:blur(15px);
  border:1px solid rgba(56,189,248,0.2);
}

/* PROJECTS */
.projects{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:25px;
}

.card{
  border-radius:16px;
  background:rgba(15,23,42,0.25);
  backdrop-filter:blur(20px);
  border:1px solid rgba(56,189,248,0.2);
  overflow:hidden;
  transition:0.4s;
  transform:translateY(40px);
  opacity:0;
  cursor:pointer;
}

.card.show{
  transform:translateY(0);
  opacity:1;
}

.card:hover{
  transform:translateY(-10px) scale(1.02);
  box-shadow:0 10px 40px rgba(56,189,248,0.3);
}

.card img{
  width:100%;
  height:200px;
  object-fit:cover;
}

.card-content{padding:15px;}

.tag{
  background:rgba(56,189,248,0.2);
  padding:4px 8px;
  margin:3px;
  border-radius:6px;
  display:inline-block;
}

/* SKILLS */
.skills{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
}

.skill{
  background:rgba(56,189,248,0.2);
  padding:6px 12px;
  border-radius:8px;
}

/* MODAL */
#modal{
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  top:0;
  left:0;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
  z-index:1000;
}

#modalContent{
  background:rgba(15,23,42,0.3);
  backdrop-filter:blur(20px);
  border:1px solid rgba(56,189,248,0.2);
  padding:20px;
  border-radius:10px;
  max-width:500px;
}
</style>
</head>

<body>

<div class="background"></div>
<canvas id="particleCanvas"></canvas>

<header>
<h1 id="name"></h1>
<p id="tagline"></p>
</header>

<section class="hero">
<h2>I build <span id="typing"></span></h2>
</section>

<!-- ABOUT -->
<section>
<h2>About</h2>
<details>
<summary>Click to expand</summary>
<div id="about"></div>
</details>
</section>

<!-- SKILLS -->
<section>
<h2>Skills</h2>
<div id="skills" class="skills"></div>
</section>

<!-- PROJECTS -->
<section>
<h2>Projects</h2>
<div id="projects" class="projects"></div>
</section>

<!-- CONTACT -->
<section>
<h2>Contact</h2>
<p id="contact"></p>
</section>

<!-- MODAL -->
<div id="modal">
<div id="modalContent">
<h2 id="modalTitle"></h2>
<p id="modalDesc"></p>

<p><b>Problem:</b> <span id="modalProblem"></span></p>
<p><b>Solution:</b> <span id="modalSolution"></span></p>
<p><b>System:</b> <span id="modalSystem"></span></p>
<p><b>Impact:</b> <span id="modalImpact"></span></p>

<div id="modalTech"></div>
<br>
<button onclick="closeModal()">Close</button>
</div>
</div>

<script>

// LOAD DATA
fetch("content.json")
.then(res=>res.json())
.then(data=>{

document.getElementById("name").innerText=data.name;
document.getElementById("tagline").innerText=data.tagline;

// ABOUT
document.getElementById("about").innerHTML=`
<p>${data.about.intro}</p>
<p>${data.about.approach}</p>
<p>${data.about.focus}</p>
`;

// CONTACT
document.getElementById("contact").innerHTML=
`Email: <a href="mailto:${data.contact.email}">${data.contact.email}</a><br>
<a href="${data.contact.linkedin}" target="_blank">LinkedIn</a>`;

// SKILLS
let skillHTML="";
data.skills.forEach(s=>{
skillHTML+=`<span class="skill">${s}</span>`;
});
document.getElementById("skills").innerHTML=skillHTML;

// PROJECTS
let html="";
data.projects.forEach(p=>{
html+=`
<div class="card" onclick='openModal(${JSON.stringify(p)})'>
<img src="${p.image}" onerror="this.src='photo.jpg'">
<div class="card-content">
<h3>${p.title}</h3>
<p>${p.short}</p>
<div>${(p.tech||[]).map(t=>`<span class="tag">${t}</span>`).join("")}</div>
</div>
</div>
`;
});
document.getElementById("projects").innerHTML=html;

// ANIMATION
function reveal(){
document.querySelectorAll(".card").forEach(c=>{
if(c.getBoundingClientRect().top<window.innerHeight-120){
c.classList.add("show");
}
});
}
window.addEventListener("scroll",reveal);
reveal();

});

// MODAL
function openModal(p){
document.getElementById("modal").style.display="flex";

document.getElementById("modalTitle").innerText=p.title;
document.getElementById("modalDesc").innerText=p.description||"";
document.getElementById("modalProblem").innerText=p.problem||"";
document.getElementById("modalSolution").innerText=p.solution||"";
document.getElementById("modalSystem").innerText=p.system||"";
document.getElementById("modalImpact").innerText=p.impact||"";

document.getElementById("modalTech").innerHTML=
(p.tech||[]).map(t=>`<span class="tag">${t}</span>`).join("");
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

// PARTICLES
const canvas=document.getElementById("particleCanvas");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

let particles=[];
for(let i=0;i<60;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
vx:(Math.random()-0.5),
vy:(Math.random()-0.5)
});
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{
p.x+=p.vx;
p.y+=p.vy;

ctx.beginPath();
ctx.arc(p.x,p.y,2,0,Math.PI*2);
ctx.fillStyle="#38bdf8";
ctx.fill();
});

for(let i=0;i<particles.length;i++){
for(let j=i+1;j<particles.length;j++){
let dx=particles[i].x-particles[j].x;
let dy=particles[i].y-particles[j].y;
let dist=Math.sqrt(dx*dx+dy*dy);

if(dist<120){
ctx.beginPath();
ctx.moveTo(particles[i].x,particles[i].y);
ctx.lineTo(particles[j].x,particles[j].y);
ctx.strokeStyle="rgba(56,189,248,0.2)";
ctx.stroke();
}
}
}

requestAnimationFrame(animate);
}
animate();

// TOUCH EFFECT
document.addEventListener("touchstart",()=>{
document.body.style.filter="brightness(1.2)";
setTimeout(()=>document.body.style.filter="brightness(1)",200);
});

// TYPING
const words=["AI systems","real-world solutions","innovative tech"];
let i=0,j=0,del=false;

function type(){
let el=document.getElementById("typing");
let word=words[i];

if(!del){
el.textContent=word.substring(0,j++);
if(j>word.length){del=true;setTimeout(type,1000);return;}
}else{
el.textContent=word.substring(0,j--);
if(j===0){del=false;i=(i+1)%words.length;}
}
setTimeout(type,del?40:80);
}
type();

</script>

</body>
</html>
