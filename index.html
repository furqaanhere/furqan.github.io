<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Furqan Portfolio</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#020617;
  color:white;
}

.container{
  max-width:1000px;
  margin:auto;
  padding:20px;
}

h1,h2{color:#38bdf8;}

.card{
  background:rgba(15,23,42,0.6);
  padding:20px;
  border-radius:12px;
  margin:20px 0;
}

/* TAGS */
.tag{
  display:inline-block;
  background:#38bdf8;
  color:black;
  padding:6px 10px;
  margin:5px;
  border-radius:6px;
}

/* PROJECT */
.project{
  margin-bottom:20px;
  padding:15px;
  border-radius:10px;
  background:#0f172a;
}

img{
  width:100%;
  border-radius:10px;
  margin:10px 0;
}

/* BUTTON */
.btn{
  background:#38bdf8;
  padding:10px 15px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  color:black;
  text-decoration:none;
}
</style>
</head>

<body>

<div class="container">

<h1 id="name">Furqan Ahmad Bhat</h1>

<!-- PROFILE -->
<div class="card">
<h2 id="tagline"></h2>
<p id="about"></p>

<a id="resumeBtn" class="btn" target="_blank">📄 Download Resume</a>
</div>

<!-- SKILLS -->
<div class="card">
<h2>Skills</h2>
<div id="skills"></div>
</div>

<!-- TOOLS -->
<div class="card">
<h2>Tools & Technologies</h2>
<div id="tools"></div>
</div>

<!-- STRENGTHS -->
<div class="card">
<h2>Strengths</h2>
<div id="strengths"></div>
</div>

<!-- PROJECTS -->
<div class="card">
<h2>Projects</h2>
<div id="projects"></div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, doc, getDoc } 
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC_i8vOeQZMdhaKLd32IbwKjUsTlm56Zpc",
  authDomain: "furqaan-portfolio.firebaseapp.com",
  projectId: "furqaan-portfolio"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* LOAD DATA */
async function load(){

let snap = await getDoc(doc(db,"portfolio","data"));

if(!snap.exists()) return;

let d = snap.data();

/* PROFILE */
document.getElementById("tagline").innerText = d.tagline || "";
document.getElementById("about").innerText = d.about?.intro || "";

/* RESUME */
if(d.resume){
  document.getElementById("resumeBtn").href = d.resume;
}else{
  document.getElementById("resumeBtn").style.display="none";
}

/* TAG RENDER */
function renderTags(id, arr){
  let container = document.getElementById(id);
  container.innerHTML="";
  (arr||[]).forEach(v=>{
    let span=document.createElement("span");
    span.className="tag";
    span.innerText=v;
    container.appendChild(span);
  });
}

/* LOAD TAGS */
renderTags("skills", d.skills);
renderTags("tools", d.tools);
renderTags("strengths", d.strengths);

/* PROJECTS */
let projDiv = document.getElementById("projects");
projDiv.innerHTML="";

(d.projects||[]).forEach(p=>{

let div=document.createElement("div");
div.className="project";

div.innerHTML=`
<h3>${p.title}</h3>
<p><b>${p.short}</b></p>
<img src="${p.image}" alt="">
<p>${p.description}</p>
`;

projDiv.appendChild(div);

});

}

load();

</script>

</body>
</html>
