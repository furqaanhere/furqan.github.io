<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Furqan Portfolio</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Segoe UI',sans-serif;
  color:white;
  overflow-x:hidden;
}

/* 🔥 PHOTO BACKGROUND */
.bg{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;

  background:
    linear-gradient(rgba(2,6,23,0.7), rgba(2,6,23,0.9)),
    url("photo.jpg");

  background-size:cover;
  background-position:center;

  z-index:-5;
}

/* GLASS UI */
.glass{
  background:rgba(15,23,42,0.35);
  backdrop-filter:blur(18px);
  border-radius:16px;
  padding:20px;
  margin:20px;
  border:1px solid rgba(255,255,255,0.08);
}

/* HERO */
.hero{
  height:70vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:20px;
}

/* CARD */
.card{
  border-radius:16px;
  overflow:hidden;
  cursor:pointer;
  transition:0.3s;
}
.card:hover{transform:translateY(-10px);}
.card img{
  width:100%;
  height:200px;
  object-fit:cover;
}
.card-content{padding:15px;}

.tag{
  background:rgba(255,255,255,0.1);
  padding:4px 8px;
  margin:2px;
  border-radius:6px;
}

/* SKILLS */
.skill{
  display:inline-block;
  padding:8px 12px;
  margin:5px;
  background:rgba(255,255,255,0.05);
  border-radius:8px;
}

/* ACHIEVEMENTS */
.ach{
  margin:6px 0;
  padding:8px;
  background:rgba(255,255,255,0.05);
  border-radius:6px;
}

/* MODAL */
#modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  justify-content:center;
  align-items:center;
}
#modalContent{
  width:90%;
  max-width:600px;
  background:#020617;
  padding:20px;
  border-radius:12px;
}

button{
  padding:8px 12px;
  background:#0ea5e9;
  border:none;
  border-radius:6px;
  margin-top:10px;
}

a{color:#38bdf8;text-decoration:none;}
</style>
</head>

<body>

<!-- 🔥 BACKGROUND -->
<div class="bg"></div>

<header style="text-align:center;padding:20px;">
<h1 id="name"></h1>
<p id="tagline"></p>
</header>

<section class="hero">
<h2>I build <span id="typing"></span></h2>
</section>

<div class="grid">

<div class="glass">
<h2>About</h2>
<div id="about"></div>
</div>

<div class="glass">
<h2>Skills</h2>
<div id="skills"></div>
</div>

<div class="glass">
<h2>Achievements</h2>
<div id="achievements"></div>
</div>

<div class="glass">
<h2>Resume</h2>
<div id="resume"></div>
</div>

<div class="glass" style="grid-column:span 2;">
<h2>Projects</h2>
<div id="projects" class="grid"></div>
</div>

<div class="glass">
<h2>Contact</h2>
<div id="contact"></div>
</div>

</div>

<!-- MODAL -->
<div id="modal">
<div id="modalContent">
<img id="modalImage" style="width:100%;height:200px;">
<h2 id="modalTitle"></h2>
<p id="modalDesc"></p>
<button onclick="closeModal()">Close</button>
</div>
</div>

<script>

/* LOAD DATA */
let local = localStorage.getItem("data");

if(local){
  loadData(JSON.parse(local));
}else{
  fetch("content.json")
  .then(r=>r.json())
  .then(loadData);
}

function loadData(data){

name.innerText=data.name;
tagline.innerText=data.tagline;

// ABOUT
about.innerHTML=`<p>${data.about?.intro || ""}</p>`;

// CONTACT
contact.innerHTML=`
<p>Email: ${data.contact?.email || ""}</p>
<a href="${data.contact?.linkedin || "#"}" target="_blank">LinkedIn</a>
`;

// SKILLS
skills.innerHTML=(data.skills||[]).map(s=>
`<span class="skill">${s}</span>`).join("");

// ACHIEVEMENTS
achievements.innerHTML=(data.achievements||[]).map(a=>
`<div class="ach">🏆 ${a}</div>`).join("");

// RESUME
resume.innerHTML=data.resume
? `<a href="${data.resume}" target="_blank"><button>View Resume</button></a>`
: `<p>No resume added</p>`;

// PROJECTS
projects.innerHTML=(data.projects||[]).map(p=>`
<div class="card" onclick='openModal(${JSON.stringify(p)})'>
<img src="${p.image}" onerror="this.src='photo.jpg'">
<div class="card-content">
<h3>${p.title}</h3>
<p>${p.short}</p>
${(p.tech||[]).map(t=>`<span class="tag">${t}</span>`).join("")}
</div>
</div>
`).join("");

}

/* MODAL */
function openModal(p){
modal.style.display="flex";
modalImage.src=p.image;
modalTitle.innerText=p.title;
modalDesc.innerText=p.description;
}
function closeModal(){
modal.style.display="none";
}

/* TYPING */
const words=["AI systems","future tech","innovative solutions"];
let i=0,j=0,d=false;

(function t(){
let w=words[i];
typing.textContent=d?w.substring(0,j--):w.substring(0,j++);
if(j===w.length+1){d=true;setTimeout(t,1000);return;}
if(j===0){d=false;i=(i+1)%words.length;}
setTimeout(t,d?40:80);
})();

</script>

</body>
</html>
