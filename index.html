<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Furqan Portfolio</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Arial;
  background:#020617;
  color:white;
}

/* BACKGROUND */
.background{
  position:fixed;
  width:100%;
  height:100%;
  background:url("photo.jpg") center/cover no-repeat;
  z-index:-3;
  filter:brightness(0.6);
}

/* HEADER */
header{
  padding:20px;
  text-align:center;
  background:rgba(0,0,0,0.3);
  backdrop-filter:blur(10px);
}
header h1{color:#38bdf8;}

/* HERO */
.hero{
  height:60vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

/* SECTION */
section{padding:50px 20px;}

/* ABOUT */
details{
  background:rgba(15,23,42,0.3);
  padding:15px;
  border-radius:10px;
}

/* SKILLS */
.skills{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:center;
}

.skill{
  background:rgba(56,189,248,0.2);
  padding:6px 12px;
  border-radius:8px;
}

/* PROJECTS */
.projects{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:20px;
}

.card{
  background:rgba(15,23,42,0.3);
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
  transition:0.3s;
}

.card:hover{
  transform:scale(1.03);
}

.card img{
  width:100%;
  height:180px;
  object-fit:cover;
}

.card-content{padding:15px;}

.tag{
  background:rgba(56,189,248,0.2);
  padding:4px 8px;
  margin:3px;
  border-radius:6px;
  display:inline-block;
}

/* MODAL */
#modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
}

#modalContent{
  width:90%;
  max-width:600px;
  background:#020617;
  padding:20px;
  border-radius:12px;
}

#modalImage{
  width:100%;
  height:200px;
  object-fit:cover;
  margin-bottom:10px;
}

button{
  margin-top:10px;
  padding:8px 12px;
  border:none;
  background:#38bdf8;
  color:black;
  border-radius:6px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="background"></div>

<header>
<h1 id="name"></h1>
<p id="tagline"></p>
</header>

<section class="hero">
<h2>I build <span id="typing"></span></h2>
</section>

<section>
<h2>About</h2>
<details>
<summary>Click to expand</summary>
<div id="about"></div>
</details>
</section>

<section>
<h2>Skills</h2>
<div id="skills" class="skills"></div>
</section>

<section>
<h2>Projects</h2>
<div id="projects" class="projects"></div>
</section>

<section>
<h2>Contact</h2>
<p id="contact"></p>
</section>

<!-- MODAL -->
<div id="modal">
  <div id="modalContent">
    <img id="modalImage">
    <h2 id="modalTitle"></h2>
    <p id="modalDesc"></p>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<script>

document.addEventListener("DOMContentLoaded", ()=>{

fetch("content.json")
.then(res=>res.json())
.then(data=>{

// BASIC
document.getElementById("name").innerText=data.name;
document.getElementById("tagline").innerText=data.tagline;

// ABOUT
document.getElementById("about").innerHTML=`
<p>${data.about.intro}</p>
<p>${data.about.approach}</p>
<p>${data.about.focus}</p>
`;

// CONTACT
document.getElementById("contact").innerHTML=
`Email: <a href="mailto:${data.contact.email}">${data.contact.email}</a>`;

// SKILLS
document.getElementById("skills").innerHTML=
data.skills.map(s=>`<span class="skill">${s}</span>`).join("");

// PROJECTS (SAFE)
let html="";
data.projects.forEach((p,i)=>{
html+=`
<div class="card" data-index="${i}">
<img src="${p.image}" onerror="this.src='photo.jpg'">
<div class="card-content">
<h3>${p.title}</h3>
<p>${p.short}</p>
${p.tech.map(t=>`<span class="tag">${t}</span>`).join("")}
</div>
</div>
`;
});
document.getElementById("projects").innerHTML=html;

// CLICK FIX
document.querySelectorAll(".card").forEach(card=>{
card.addEventListener("click",()=>{
let i=card.getAttribute("data-index");
openModal(data.projects[i]);
});
});

});

});

// MODAL
function openModal(p){
document.getElementById("modal").style.display="flex";
document.getElementById("modalImage").src=p.image;
document.getElementById("modalTitle").innerText=p.title;
document.getElementById("modalDesc").innerText=p.description;
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

// TYPING
const words=["AI systems","real-world solutions","innovative tech"];
let i=0,j=0,d=false;

function type(){
let el=document.getElementById("typing");
let word=words[i];

if(!d){
el.textContent=word.substring(0,j++);
if(j>word.length){d=true;setTimeout(type,1000);return;}
}else{
el.textContent=word.substring(0,j--);
if(j===0){d=false;i=(i+1)%words.length;}
}
setTimeout(type,d?40:80);
}
type();

</script>

</body>
</html>
