<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Furqan Portfolio</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Arial;
  background:#020617;
  color:white;
  overflow-x:hidden;
}

/* BACKGROUND */
.background{
  position:fixed;
  width:110%;
  height:110%;
  top:-5%;
  left:-5%;
  background:url("photo.jpg") center/cover no-repeat;
  filter:brightness(0.5);
  z-index:-3;
  transition:transform 0.2s ease-out;
}

/* PARTICLES */
#canvas{
  position:fixed;
  width:100%;
  height:100%;
  z-index:-2;
}

/* CURSOR */
#cursorGlow{
  position:fixed;
  width:300px;
  height:300px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(56,189,248,0.25), transparent 70%);
  pointer-events:none;
  z-index:-1;
  transform:translate(-50%,-50%);
}

/* HEADER */
header{
  padding:20px;
  text-align:center;
  background:rgba(0,0,0,0.35);
  backdrop-filter:blur(15px);
}

/* HERO */
.hero{
  height:80vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
}

/* SECTIONS */
section{
  padding:80px 20px;
  opacity:0;
  transform:translateY(60px);
  transition:0.8s;
}

section.show{
  opacity:1;
  transform:translateY(0);
}

/* GLASS */
.glass{
  background:rgba(15,23,42,0.3);
  backdrop-filter:blur(20px);
  border-radius:16px;
  padding:25px;
  border:1px solid rgba(56,189,248,0.2);
}

/* SKILLS */
.skills{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
}
.skill{
  background:rgba(56,189,248,0.2);
  padding:8px 14px;
  border-radius:10px;
}

/* PROJECTS */
.projects{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:25px;
}

.card{
  background:rgba(15,23,42,0.35);
  backdrop-filter:blur(20px);
  border-radius:16px;
  overflow:hidden;
  cursor:pointer;
  transition:0.3s;
  transform-style:preserve-3d;
}

.card:hover{
  box-shadow:0 25px 60px rgba(56,189,248,0.3);
}

.card img{
  width:100%;
  height:200px;
  object-fit:cover;
}

.card-content{padding:15px;}

.tag{
  background:rgba(56,189,248,0.2);
  padding:4px 8px;
  margin:3px;
  border-radius:6px;
}

/* MODAL */
#modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  backdrop-filter:blur(8px);
  justify-content:center;
  align-items:center;
}

#modalContent{
  width:90%;
  max-width:600px;
  background:#020617;
  padding:20px;
  border-radius:14px;
  animation:fade 0.3s ease;
}

@keyframes fade{
  from{opacity:0;transform:scale(0.9);}
  to{opacity:1;transform:scale(1);}
}

button{
  margin-top:10px;
  padding:8px 12px;
  background:#38bdf8;
  border:none;
  border-radius:6px;
}
</style>
</head>

<body>

<div id="cursorGlow"></div>
<div class="background"></div>
<canvas id="canvas"></canvas>

<header>
<h1 id="name"></h1>
<p id="tagline"></p>
</header>

<section class="hero show">
<h2>I build <span id="typing"></span></h2>
</section>

<section class="glass">
<h2>About</h2>
<div id="about"></div>
</section>

<section>
<h2>Skills</h2>
<div id="skills" class="skills"></div>
</section>

<section>
<h2>Projects</h2>
<div id="projects" class="projects"></div>
</section>

<section>
<h2>Contact</h2>
<div id="contact"></div>
</section>

<div id="modal">
<div id="modalContent">
<img id="modalImage" style="width:100%;height:200px;object-fit:cover;">
<h2 id="modalTitle"></h2>
<p id="modalDesc"></p>
<button onclick="closeModal()">Close</button>
</div>
</div>

<script>
// LOAD DATA
document.addEventListener("DOMContentLoaded",()=>{

fetch("content.json")
.then(r=>r.json())
.then(data=>{

name.innerText=data.name;
tagline.innerText=data.tagline;

about.innerHTML=`
<p>${data.about.intro}</p>
<p>${data.about.approach}</p>
<p>${data.about.focus}</p>
`;

contact.innerHTML=`
<p>Email: <a href="mailto:${data.contact.email}">${data.contact.email}</a></p>
<p><a href="${data.contact.linkedin}" target="_blank">LinkedIn</a></p>
`;

skills.innerHTML=data.skills.map(s=>`<span class="skill">${s}</span>`).join("");

projects.innerHTML=data.projects.map((p,i)=>`
<div class="card" data-i="${i}">
<img src="${p.image}">
<div class="card-content">
<h3>${p.title}</h3>
<p>${p.short}</p>
${p.tech.map(t=>`<span class="tag">${t}</span>`).join("")}
</div>
</div>
`).join("");

document.querySelectorAll(".card").forEach(c=>{
c.onclick=()=>openModal(data.projects[c.dataset.i]);
});

// SECTION REVEAL
const sections=document.querySelectorAll("section");
window.addEventListener("scroll",()=>{
sections.forEach(s=>{
if(s.getBoundingClientRect().top<window.innerHeight-100){
s.classList.add("show");
}
});
});

});

});

// MODAL
function openModal(p){
modal.style.display="flex";
modalImage.src=p.image;
modalTitle.innerText=p.title;
modalDesc.innerText=p.description;
}
function closeModal(){
modal.style.display="none";
}

// CURSOR
document.addEventListener("mousemove",e=>{
cursorGlow.style.left=e.clientX+"px";
cursorGlow.style.top=e.clientY+"px";
});

// PARALLAX
window.addEventListener("scroll",()=>{
document.querySelector(".background").style.transform=
`translateY(${scrollY*0.2}px) scale(1.05)`;
});

// PARTICLES
const c=document.getElementById("canvas");
const ctx=c.getContext("2d");
c.width=innerWidth;c.height=innerHeight;

let p=[];
for(let i=0;i<35;i++){
p.push({x:Math.random()*c.width,y:Math.random()*c.height,vx:(Math.random()-0.5),vy:(Math.random()-0.5)});
}

function draw(){
ctx.clearRect(0,0,c.width,c.height);
p.forEach(a=>{
a.x+=a.vx;a.y+=a.vy;
ctx.beginPath();ctx.arc(a.x,a.y,2,0,6.28);
ctx.fillStyle="#38bdf8";ctx.fill();
});
requestAnimationFrame(draw);
}
draw();

// TYPING
const words=["AI systems","real-world solutions","innovative tech"];
let i=0,j=0,d=false;
(function t(){
let w=words[i];
typing.textContent=d?w.substring(0,j--):w.substring(0,j++);
if(j===w.length+1){d=true;setTimeout(t,1000);return;}
if(j===0){d=false;i=(i+1)%words.length;}
setTimeout(t,d?40:80);
})();
</script>

</body>
</html>
