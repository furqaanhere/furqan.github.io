<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Furqan Portfolio</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Arial;
  color:white;
  background:#020617;
  overflow-x:hidden;
}

/* BACKGROUND IMAGE */
.background{
  position:fixed;
  width:100%;
  height:100%;
  background:url("photo.jpg") center/cover no-repeat;
  z-index:-3;
  filter:brightness(0.6);
}

/* PARTICLES */
#canvas{
  position:fixed;
  width:100%;
  height:100%;
  z-index:-2;
}

/* HEADER */
header{
  text-align:center;
  padding:20px;
  background:rgba(0,0,0,0.3);
  backdrop-filter:blur(10px);
}

header h1{color:#38bdf8;}

/* HERO */
.hero{
  height:70vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

/* SECTION */
section{padding:60px 20px;}

/* GLASS */
.glass{
  background:rgba(15,23,42,0.3);
  backdrop-filter:blur(20px);
  border-radius:12px;
  padding:15px;
}

/* SKILLS */
.skills{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:center;
}

.skill{
  background:rgba(56,189,248,0.2);
  padding:6px 12px;
  border-radius:8px;
}

/* PROJECTS */
.projects{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:20px;
}

.card{
  background:rgba(15,23,42,0.3);
  backdrop-filter:blur(20px);
  border-radius:12px;
  overflow:hidden;
  transition:0.3s;
  transform-style:preserve-3d;
  cursor:pointer;
}

.card img{
  width:100%;
  height:200px;
  object-fit:cover;
}

.card-content{padding:10px;}

.tag{
  background:rgba(56,189,248,0.2);
  padding:4px 8px;
  margin:3px;
  border-radius:6px;
}

/* MODAL */
#modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
}

#modalContent{
  background:#020617;
  padding:20px;
  border-radius:10px;
  max-width:500px;
}
</style>
</head>

<body>

<div class="background"></div>
<canvas id="canvas"></canvas>

<header>
<h1 id="name"></h1>
<p id="tagline"></p>
</header>

<section class="hero">
<h2>I build <span id="typing"></span></h2>
</section>

<section>
<h2>About</h2>
<div id="about" class="glass"></div>
</section>

<section>
<h2>Skills</h2>
<div id="skills" class="skills"></div>
</section>

<section>
<h2>Projects</h2>
<div id="projects" class="projects"></div>
</section>

<section>
<h2>Contact</h2>
<p id="contact"></p>
</section>

<!-- MODAL -->
<div id="modal">
<div id="modalContent">
<h3 id="modalTitle"></h3>
<p id="modalDesc"></p>
<button onclick="closeModal()">Close</button>
</div>
</div>

<!-- 🔥 FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC_i8vOeQZMdhaKLd32IbwKjUsTlm56Zpc",
  authDomain: "furqaan-portfolio.firebaseapp.com",
  projectId: "furqaan-portfolio",
  storageBucket: "furqaan-portfolio.firebasestorage.app",
  messagingSenderId: "1004771356492",
  appId: "1:1004771356492:web:262c4927357bed2ce0e9e9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* LOAD DATA */
async function loadData(){

let data;

// 🔥 Try Firebase first
try{
const ref = doc(db,"portfolio","data");
const snap = await getDoc(ref);
if(snap.exists()) data = snap.data();
}catch(e){}

// fallback JSON
if(!data){
const res = await fetch("content.json");
data = await res.json();
}

render(data);
}

function render(data){

document.getElementById("name").innerText=data.name;
document.getElementById("tagline").innerText=data.tagline;

document.getElementById("about").innerHTML=
`${data.about.intro}<br>${data.about.approach}<br>${data.about.focus}`;

document.getElementById("contact").innerHTML=
`Email: ${data.contact.email}<br>
<a href="${data.contact.linkedin}" target="_blank">LinkedIn</a>`;

// skills
document.getElementById("skills").innerHTML=
data.skills.map(s=>`<span class="skill">${s}</span>`).join("");

// projects
document.getElementById("projects").innerHTML=
data.projects.map(p=>`
<div class="card" onclick='openModal(${JSON.stringify(p)})'>
<img src="${p.image}">
<div class="card-content">
<h3>${p.title}</h3>
<p>${p.short}</p>
</div>
</div>`).join("");

}

loadData();
</script>

<!-- UI JS -->
<script>

// MODAL
function openModal(p){
modal.style.display="flex";
modalTitle.innerText=p.title;
modalDesc.innerText=p.description;
}
function closeModal(){
modal.style.display="none";
}

// PARTICLES
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

let p=[];
for(let i=0;i<40;i++){
p.push({x:Math.random()*innerWidth,y:Math.random()*innerHeight});
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);
p.forEach(pt=>{
ctx.beginPath();
ctx.arc(pt.x,pt.y,2,0,6.28);
ctx.fillStyle="#38bdf8";
ctx.fill();
});
requestAnimationFrame(draw);
}
draw();

// TYPING
let words=["AI systems","real-world solutions","innovative tech"];
let i=0,j=0,d=false;
function type(){
let el=document.getElementById("typing");
let w=words[i];
el.innerText=w.substring(0,j);
if(!d){j++; if(j>w.length){d=true;setTimeout(type,800);return;}}
else{j--; if(j==0){d=false;i=(i+1)%words.length;}}
setTimeout(type,d?40:80);
}
type();

</script>

</body>
</html>
