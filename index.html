<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Furqan Tech Portfolio</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family: 'Courier New', monospace;
  background:#020617;
  color:#e2e8f0;
  overflow-x:hidden;
}

/* GRID BACKGROUND */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background-image:
    linear-gradient(rgba(56,189,248,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(56,189,248,0.05) 1px, transparent 1px);
  background-size:40px 40px;
  z-index:-3;
}

/* SCAN LINE */
body::after{
  content:"";
  position:fixed;
  width:100%;
  height:2px;
  background:rgba(56,189,248,0.3);
  animation:scan 4s linear infinite;
  z-index:-2;
}
@keyframes scan{
  0%{top:0;}
  100%{top:100%;}
}

/* HEADER */
header{
  text-align:center;
  padding:20px;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(10px);
}

header h1{
  color:#38bdf8;
  text-shadow:0 0 10px #38bdf8;
}

/* HERO */
.hero{
  height:70vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
}

.hero h2{
  font-size:2rem;
  text-shadow:0 0 8px #38bdf8;
}

/* SECTIONS */
section{
  padding:60px 20px;
}

/* GLASS PANEL */
.glass{
  background:rgba(15,23,42,0.4);
  border:1px solid rgba(56,189,248,0.2);
  backdrop-filter:blur(10px);
  border-radius:12px;
  padding:20px;
}

/* SKILLS */
.skills{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:center;
}

.skill{
  padding:6px 12px;
  border:1px solid #38bdf8;
  border-radius:8px;
  box-shadow:0 0 5px #38bdf8;
}

/* PROJECTS */
.projects{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:20px;
}

.card{
  border:1px solid rgba(56,189,248,0.2);
  border-radius:12px;
  overflow:hidden;
  background:rgba(15,23,42,0.4);
  transition:0.3s;
  cursor:pointer;
}

.card:hover{
  transform:translateY(-5px);
  box-shadow:0 0 20px #38bdf8;
}

.card img{
  width:100%;
  height:180px;
  object-fit:cover;
}

.card-content{padding:15px;}

.tag{
  border:1px solid #38bdf8;
  padding:3px 6px;
  margin:2px;
  border-radius:6px;
}

/* LINKS */
a{color:#38bdf8;text-decoration:none;}
a:hover{text-shadow:0 0 5px #38bdf8;}

/* MODAL */
#modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
}

#modalContent{
  background:#020617;
  padding:20px;
  border:1px solid #38bdf8;
  border-radius:10px;
}

button{
  margin-top:10px;
  padding:8px;
  background:#38bdf8;
  border:none;
  cursor:pointer;
}

/* TYPING CURSOR */
#typing::after{
  content:"|";
  animation:blink 1s infinite;
}
@keyframes blink{
  0%,100%{opacity:1;}
  50%{opacity:0;}
}

</style>
</head>

<body>

<header>
<h1 id="name"></h1>
<p id="tagline"></p>
</header>

<section class="hero">
<h2>I build <span id="typing"></span></h2>
</section>

<section class="glass">
<h2>About</h2>
<div id="about"></div>
</section>

<section>
<h2>Skills</h2>
<div id="skills" class="skills"></div>
</section>

<section>
<h2>Projects</h2>
<div id="projects" class="projects"></div>
</section>

<section>
<h2>Contact</h2>
<div id="contact"></div>
</section>

<div id="modal">
<div id="modalContent">
<img id="modalImage" style="width:100%;height:200px;">
<h2 id="modalTitle"></h2>
<p id="modalDesc"></p>
<button onclick="closeModal()">Close</button>
</div>
</div>

<script>

document.addEventListener("DOMContentLoaded",()=>{

fetch("content.json")
.then(r=>r.json())
.then(data=>{

name.innerText=data.name;
tagline.innerText=data.tagline;

about.innerHTML=`
<p>${data.about.intro}</p>
<p>${data.about.approach}</p>
<p>${data.about.focus}</p>
`;

contact.innerHTML=`
<p>Email: <a href="mailto:${data.contact.email}">${data.contact.email}</a></p>
<p><a href="${data.contact.linkedin}" target="_blank">LinkedIn</a></p>
`;

skills.innerHTML=data.skills.map(s=>`<span class="skill">${s}</span>`).join("");

projects.innerHTML=data.projects.map((p,i)=>`
<div class="card" onclick='openModal(${JSON.stringify(p)})'>
<img src="${p.image}">
<div class="card-content">
<h3>${p.title}</h3>
<p>${p.short}</p>
${p.tech.map(t=>`<span class="tag">${t}</span>`).join("")}
</div>
</div>
`).join("");

});

});

// MODAL
function openModal(p){
modal.style.display="flex";
modalImage.src=p.image;
modalTitle.innerText=p.title;
modalDesc.innerText=p.description;
}
function closeModal(){
modal.style.display="none";
}

// TYPING
const words=["AI systems","smart solutions","future tech"];
let i=0,j=0,d=false;

function type(){
let w=words[i];
typing.textContent=d?w.substring(0,j--):w.substring(0,j++);
if(j===w.length+1){d=true;setTimeout(type,1000);return;}
if(j===0){d=false;i=(i+1)%words.length;}
setTimeout(type,d?40:80);
}
type();

</script>

</body>
</html>
