<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Furqan Portfolio</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family: Arial;
  background:#020617;
  color:white;
  touch-action: manipulation;
}

/* BACKGROUND */
.background{
  position:fixed;
  width:100%;
  height:100%;
  background:url("photo.jpg") center/cover no-repeat;
  z-index:-3;
  filter:brightness(0.6);
}

#particleCanvas{
  position:fixed;
  width:100%;
  height:100%;
  z-index:-2;
}

/* HEADER */
header{
  padding:20px;
  text-align:center;
  background:rgba(0,0,0,0.3);
  backdrop-filter:blur(15px);
}
header h1{color:#38bdf8;}

/* HERO */
.hero{
  height:70vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

/* SECTION */
section{padding:60px 20px;}

/* GLASS */
details{
  background:rgba(15,23,42,0.25);
  padding:15px;
  border-radius:10px;
  backdrop-filter:blur(15px);
}

/* PROJECTS */
.projects{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:25px;
}

/* CARD */
.card{
  border-radius:16px;
  background:rgba(15,23,42,0.25);
  backdrop-filter:blur(20px);
  border:1px solid rgba(56,189,248,0.2);
  overflow:hidden;
  transition:0.2s;
  transform-style:preserve-3d;
  opacity:0;
  transform:translateY(40px);
}

.card.show{
  opacity:1;
  transform:translateY(0);
}

.card img{
  width:100%;
  height:200px;
  object-fit:cover;
}

.card-content{padding:15px;}

.tag{
  background:rgba(56,189,248,0.2);
  padding:4px 8px;
  margin:3px;
  border-radius:6px;
}

/* SKILLS */
.skills{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
}

.skill{
  background:rgba(56,189,248,0.2);
  padding:6px 12px;
  border-radius:8px;
}

/* MODAL */
#modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.82);
  justify-content:center;
  align-items:center;
  z-index:1000;
  padding:20px;
  opacity:0;
  transition:0.3s ease;
}

#modal.active{
  opacity:1;
}

#modalContent{
  width:min(700px,100%);
  max-height:90vh;
  overflow-y:auto;
  background:rgba(15,23,42,0.35);
  backdrop-filter:blur(20px);
  border-radius:18px;
  padding:20px;
  transform:scale(0.8);
  opacity:0;
  transition:0.3s ease;
}

#modal.active #modalContent{
  transform:scale(1);
  opacity:1;
}

#modalImage{
  width:100%;
  height:240px;
  object-fit:cover;
  border-radius:12px;
  margin-bottom:15px;
}

.modal-buttons a, .close-btn{
  padding:8px 14px;
  border-radius:8px;
  background:#38bdf8;
  color:#000;
  text-decoration:none;
  border:none;
  cursor:pointer;
  margin:5px;
}
</style>
</head>

<body>

<div class="background"></div>
<canvas id="particleCanvas"></canvas>

<header>
<h1 id="name"></h1>
<p id="tagline"></p>
</header>

<section class="hero">
<h2>I build <span id="typing"></span></h2>
</section>

<section>
<h2>About</h2>
<details>
<summary>Click to expand</summary>
<div id="about"></div>
</details>
</section>

<section>
<h2>Skills</h2>
<div id="skills" class="skills"></div>
</section>

<section>
<h2>Projects</h2>
<div id="projects" class="projects"></div>
</section>

<section>
<h2>Contact</h2>
<p id="contact"></p>
</section>

<!-- MODAL -->
<div id="modal">
  <div id="modalContent">
    <img id="modalImage">
    <h2 id="modalTitle"></h2>
    <p id="modalShort"></p>
    <p id="modalDesc"></p>

    <p><b>Problem:</b> <span id="modalProblem"></span></p>
    <p><b>Solution:</b> <span id="modalSolution"></span></p>
    <p><b>System:</b> <span id="modalSystem"></span></p>
    <p><b>Impact:</b> <span id="modalImpact"></span></p>

    <div id="modalTech"></div>

    <div class="modal-buttons">
      <a id="modalGithub" target="_blank">GitHub</a>
      <a id="modalDemo" target="_blank">Demo</a>
    </div>

    <button class="close-btn" onclick="closeModal()">Close</button>
  </div>
</div>

<script>

// LOAD DATA
fetch("content.json").then(res=>res.json()).then(data=>{

document.getElementById("name").innerText=data.name;
document.getElementById("tagline").innerText=data.tagline;

document.getElementById("about").innerHTML=`
<p>${data.about.intro}</p>
<p>${data.about.approach}</p>
<p>${data.about.focus}</p>
`;

document.getElementById("contact").innerHTML=
`Email: <a href="mailto:${data.contact.email}">${data.contact.email}</a><br>
<a href="${data.contact.linkedin}" target="_blank">LinkedIn</a>`;

// SKILLS
document.getElementById("skills").innerHTML =
data.skills.map(s=>`<span class="skill">${s}</span>`).join("");

// PROJECTS
document.getElementById("projects").innerHTML =
data.projects.map(p=>`
<div class="card" onclick='openModal(${JSON.stringify(p)})'>
<img src="${p.image}" onerror="this.src='photo.jpg'">
<div class="card-content">
<h3>${p.title}</h3>
<p>${p.short}</p>
${(p.tech||[]).map(t=>`<span class="tag">${t}</span>`).join("")}
</div>
</div>
`).join("");

// SCROLL ANIMATION
function reveal(){
document.querySelectorAll(".card").forEach(c=>{
if(c.getBoundingClientRect().top<window.innerHeight-120){
c.classList.add("show");
}
});
}
window.addEventListener("scroll",reveal);
reveal();

// 3D EFFECT
document.querySelectorAll(".card").forEach(card=>{
card.addEventListener("mousemove",e=>{
let r=card.getBoundingClientRect();
let x=e.clientX-r.left;
let y=e.clientY-r.top;
card.style.transform=`rotateX(${-(y-r.height/2)/10}deg) rotateY(${(x-r.width/2)/10}deg)`;
});
card.addEventListener("mouseleave",()=>card.style.transform="rotate(0)");
});

});

// MODAL
function openModal(p){
const modal=document.getElementById("modal");
modal.style.display="flex";
setTimeout(()=>modal.classList.add("active"),10);

modalImage.src=p.image||"photo.jpg";
modalTitle.innerText=p.title||"";
modalShort.innerText=p.short||"";
modalDesc.innerText=p.description||"";
modalProblem.innerText=p.problem||"";
modalSolution.innerText=p.solution||"";
modalSystem.innerText=p.system||"";
modalImpact.innerText=p.impact||"";

modalTech.innerHTML=(p.tech||[]).map(t=>`<span class="tag">${t}</span>`).join("");

modalGithub.style.display=p.github?"inline-block":"none";
modalGithub.href=p.github||"#";

modalDemo.style.display=p.demo?"inline-block":"none";
modalDemo.href=p.demo||"#";
}

function closeModal(){
const modal=document.getElementById("modal");
modal.classList.remove("active");
setTimeout(()=>modal.style.display="none",300);
}

document.getElementById("modal").onclick=e=>{
if(e.target.id==="modal") closeModal();
};

// PARTICLES
const c=document.getElementById("particleCanvas");
const ctx=c.getContext("2d");
c.width=innerWidth;c.height=innerHeight;

let p=[];
for(let i=0;i<35;i++){
p.push({x:Math.random()*c.width,y:Math.random()*c.height,vx:(Math.random()-0.5),vy:(Math.random()-0.5)});
}

function draw(){
ctx.clearRect(0,0,c.width,c.height);

p.forEach(a=>{
a.x+=a.vx;a.y+=a.vy;
ctx.beginPath();ctx.arc(a.x,a.y,2,0,6.28);ctx.fillStyle="#38bdf8";ctx.fill();
});

for(let i=0;i<p.length;i++){
for(let j=i+1;j<i+4;j++){
let dx=p[i].x-p[j]?.x;
let dy=p[i].y-p[j]?.y;
if(Math.sqrt(dx*dx+dy*dy)<100){
ctx.beginPath();ctx.moveTo(p[i].x,p[i].y);
ctx.lineTo(p[j].x,p[j].y);
ctx.strokeStyle="rgba(56,189,248,0.1)";
ctx.stroke();
}
}
}

requestAnimationFrame(draw);
}
draw();

// TYPING
const words=["AI systems","real-world solutions","innovative tech"];
let i=0,j=0,d=false;
(function t(){
let w=words[i];
typing.textContent=d?w.substring(0,j--):w.substring(0,j++);
if(j===w.length+1){d=true;setTimeout(t,1000);return;}
if(j===0){d=false;i=(i+1)%words.length;}
setTimeout(t,d?40:80);
})();
</script>

</body>
</html>
