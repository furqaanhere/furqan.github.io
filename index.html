<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Furqan Portfolio</title>

<style>

body{
  margin:0;
  font-family:Arial;
  color:white;
  overflow-x:hidden;
}

/* 🎬 CINEMATIC BACKGROUND */
body::before{
  content:"";
  position:fixed;
  width:120%;
  height:120%;
  background:url("photo.jpg") no-repeat;
  background-size:cover;
  background-position:bottom left;
  z-index:-2;
  animation:bgMove 30s ease-in-out infinite alternate;
}

/* DARK GLASS OVERLAY */
body::after{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:linear-gradient(135deg, rgba(2,6,23,0.6), rgba(2,6,23,0.85));
  backdrop-filter:blur(8px);
  z-index:-1;
}

/* 🎥 BACKGROUND ANIMATION */
@keyframes bgMove{
  0%{
    transform:scale(1);
    background-position:bottom left;
  }
  100%{
    transform:scale(1.2);
    background-position:top right;
  }
}

/* CONTAINER */
.container{
  max-width:1000px;
  margin:auto;
  padding:20px;
  animation:fadeIn 1s ease;
}

/* HEADINGS */
h1,h2{
  color:#38bdf8;
  text-shadow:0 0 10px rgba(56,189,248,0.8);
}

/* GLASS CARD */
.card{
  background:rgba(255,255,255,0.07);
  backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,0.1);
  padding:20px;
  border-radius:15px;
  margin:20px 0;
  box-shadow:0 0 25px rgba(0,0,0,0.4);
  transition:0.3s;
  animation:fadeUp 0.8s ease;
}

.card:hover{
  transform:translateY(-6px) scale(1.01);
}

/* TAGS */
.tag{
  display:inline-block;
  background:rgba(56,189,248,0.15);
  border:1px solid #38bdf8;
  color:#38bdf8;
  padding:6px 10px;
  margin:5px;
  border-radius:6px;
  transition:0.3s;
}

.tag:hover{
  background:#38bdf8;
  color:black;
  box-shadow:0 0 10px #38bdf8;
}

/* PROJECT */
.project{
  margin-bottom:20px;
  padding:15px;
  border-radius:10px;
  background:rgba(15,23,42,0.6);
  backdrop-filter:blur(10px);
  animation:fadeUp 1s ease;
}

/* IMAGE */
img{
  width:100%;
  border-radius:10px;
  margin:10px 0;
  transition:0.4s;
}

img:hover{
  transform:scale(1.04);
}

/* BUTTON */
.btn{
  background:linear-gradient(45deg,#38bdf8,#0ea5e9);
  padding:10px 15px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  color:black;
  text-decoration:none;
  transition:0.3s;
}

.btn:hover{
  box-shadow:0 0 15px #38bdf8;
}

/* ANIMATIONS */
@keyframes fadeUp{
  from{
    opacity:0;
    transform:translateY(30px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

@keyframes fadeIn{
  from{opacity:0;}
  to{opacity:1;}
}

</style>
</head>

<body>

<div class="container">

<h1 id="name">Furqan Ahmad Bhat</h1>

<!-- PROFILE -->
<div class="card">
<h2 id="tagline"></h2>
<p id="about"></p>

<a id="resumeBtn" class="btn" target="_blank">📄 Download Resume</a>
</div>

<!-- SKILLS -->
<div class="card">
<h2>Skills</h2>
<div id="skills"></div>
</div>

<!-- TOOLS -->
<div class="card">
<h2>Tools & Technologies</h2>
<div id="tools"></div>
</div>

<!-- STRENGTHS -->
<div class="card">
<h2>Strengths</h2>
<div id="strengths"></div>
</div>

<!-- PROJECTS -->
<div class="card">
<h2>Projects</h2>
<div id="projects"></div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, doc, getDoc } 
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC_i8vOeQZMdhaKLd32IbwKjUsTlm56Zpc",
  authDomain: "furqaan-portfolio.firebaseapp.com",
  projectId: "furqaan-portfolio"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* LOAD DATA */
async function load(){

let snap = await getDoc(doc(db,"portfolio","data"));

if(!snap.exists()) return;

let d = snap.data();

/* PROFILE */
document.getElementById("tagline").innerText = d.tagline || "";
document.getElementById("about").innerText = d.about?.intro || "";

/* RESUME */
if(d.resume){
  document.getElementById("resumeBtn").href = d.resume;
}else{
  document.getElementById("resumeBtn").style.display="none";
}

/* TAGS */
function renderTags(id, arr){
  let container = document.getElementById(id);
  container.innerHTML="";
  (arr||[]).forEach(v=>{
    let span=document.createElement("span");
    span.className="tag";
    span.innerText=v;
    container.appendChild(span);
  });
}

/* LOAD TAGS */
renderTags("skills", d.skills);
renderTags("tools", d.tools);
renderTags("strengths", d.strengths);

/* PROJECTS */
let projDiv = document.getElementById("projects");
projDiv.innerHTML="";

(d.projects||[]).forEach(p=>{
let div=document.createElement("div");
div.className="project";

div.innerHTML=`
<h3>${p.title}</h3>
<p><b>${p.short}</b></p>
<img src="${p.image}" alt="">
<p>${p.description}</p>
`;

projDiv.appendChild(div);
});

}

load();

</script>

</body>
</html>
