<!DOCTYPE html>
<html>
<head>
<title>Furqan Portfolio</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#020617;
  color:white;
}

/* BACKGROUND */
.background{
  position:fixed;
  width:100%;
  height:100%;
  background:url("photo.jpg") center/cover no-repeat;
  z-index:-1;
  filter:brightness(0.6);
}

/* HEADER */
header{
  text-align:center;
  padding:20px;
  background:rgba(0,0,0,0.4);
}

/* SECTION */
section{
  padding:40px 20px;
}

/* TAG */
.tag{
  display:inline-block;
  background:#38bdf8;
  color:black;
  padding:5px 10px;
  margin:5px;
  border-radius:6px;
}

/* PROJECT */
.project{
  background:rgba(15,23,42,0.5);
  padding:15px;
  margin:15px 0;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="background"></div>

<header>
<h1 id="name">Furqan Ahmad Bhat</h1>
<p id="tagline"></p>
</header>

<section>
<h2>About</h2>
<p id="about"></p>
</section>

<section>
<h2>Skills</h2>
<div id="skills"></div>
</section>

<section>
<h2>Tools</h2>
<div id="tools"></div>
</section>

<section>
<h2>Strengths</h2>
<div id="strengths"></div>
</section>

<section>
<h2>Achievements</h2>
<ul id="achievements"></ul>
</section>

<section>
<h2>Projects</h2>
<div id="projects"></div>
</section>

<section>
<h2>Contact</h2>
<p>
Email: furqan8191@gmail.com <br>
<a href="https://www.linkedin.com/in/furqan-bhat-577192269" target="_blank">LinkedIn</a>
</p>
</section>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, doc, getDoc } 
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC_i8vOeQZMdhaKLd32IbwKjUsTlm56Zpc",
  authDomain: "furqaan-portfolio.firebaseapp.com",
  projectId: "furqaan-portfolio"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* LOAD DATA */
async function load(){

let data=null;

try{
let snap = await getDoc(doc(db,"portfolio","data"));
if(snap.exists()) data = snap.data();
}catch(e){}

/* FALLBACK */
if(!data){
let res = await fetch("content.json");
data = await res.json();
}

render(data);
}

/* RENDER */
function render(d){

document.getElementById("tagline").innerText=d.tagline||"";
document.getElementById("about").innerText=d.about?.intro||"";

/* TAGS */
function showTags(id,list){
document.getElementById(id).innerHTML=
(list||[]).map(x=>`<span class="tag">${x}</span>`).join("");
}

showTags("skills",d.skills);
showTags("tools",d.tools);
showTags("strengths",d.strengths);

/* ACH */
document.getElementById("achievements").innerHTML=
(d.achievements||[]).map(a=>`<li>${a}</li>`).join("");

/* PROJECTS */
let html="";
(d.projects||[]).forEach(p=>{
html+=`
<div class="project">
<h3>${p.title}</h3>
<p>${p.short}</p>
<p>${p.description}</p>
</div>
`;
});
document.getElementById("projects").innerHTML=html;

}

load();

</script>

</body>
</html>
